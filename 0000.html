    if(d.pits.length){
      h+='<section class="np-sec"><h2>Idées</h2>';
      d.pits.forEach(function(pp){
        h+='<article class="np-item"><div class="np-q">'+E(pp.q)+'</div><div class="np-pits">';
        pp.items.forEach(function(x){h+='<span class="np-pit" style="background:'+(x.c||'#ffe066')+'">'+E(x.t.trim())+'</span>';});
        h+='</div><div class="np-src">'+E(pp.les)+'</div></article>';
      });
      h+='</section>';
    }
    if(d.hl.length){
      h+='<section class="np-sec"><h2>Passages surlignés</h2>';
      d.hl.forEach(function(g){
        h+='<article class="np-item"><div class="np-q">'+E(g.les)+'</div><ul class="np-hl">';
        g.items.forEach(function(x){h+='<li><span style="background:'+(x.c||'#ffe066')+'">'+E(x.t)+'</span></li>';});
        h+='</ul></article>';
      });
      h+='</section>';
    }
    return h+'<footer class="np-foot">'+E(C.meta.title||'')+' — page </footer></div>';
  }
  function openNotesDoc(only,label){
    const old=document.getElementById('npOv');if(old)old.remove();
    const ov=document.createElement('div');ov.className='np-ov';ov.id='npOv';
    ov.innerHTML='<div class="np-bar"><span class="np-bt">'+E(label||'Mes notes')+'</span>'+
      '<div class="np-acts"><button class="np-btn" id="npPrint">Enregistrer en PDF</button>'+
      '<button class="np-btn ghost" id="npTxt">Version texte</button>'+
      '<button class="np-btn ghost" id="npClose">Fermer</button></div></div>'+
      '<div class="np-scroll">'+notesDocHTML(only,label)+'</div>';
    document.body.appendChild(ov);
    document.getElementById('npPrint').onclick=function(){window.print();};
    document.getElementById('npTxt').onclick=function(){downloadNotesTxt(only,label);};
    document.getElementById('npClose').onclick=function(){ov.remove();document.body.classList.remove('np-open');};
    document.body.classList.add('np-open');
  }
  function downloadNotes(only,label,fmt){
    if(fmt==='txt')downloadNotesTxt(only,label);
    else openNotesDoc(only,label);
  }

  /* ============ MODE ÉDITION (WYSIWYG) ============ */
  if(window.__EDIT__){
    buildEditCanvas();
    return;
  }

  function buildEditCanvas(){
    document.body.innerHTML='';
    document.body.className='edit-mode';
    const wrap=document.createElement('div');wrap.className='edit-content';
    document.body.appendChild(wrap);
    const li=window.__EDIT_LESSON__||0;
    const L=lessons[li]?lessons[li].l:(C.modules[0]&&C.modules[0].lessons[0]);
    const selId=window.__EDIT_SEL__||null;
    if(!L){wrap.innerHTML='<div class="edit-empty">Sélectionnez une leçon.</div>';return;}
    const head=document.createElement('div');head.className='edit-lhead';
    const m=lessons[li]?lessons[li].m:C.modules[0];
    head.innerHTML='<div class="les-kicker">'+E(m?m.title:'')+'</div><h1 class="les-h1">'+E(L.title)+'</h1>';
    if(!L.blocks.length){
      const s=document.createElement('div');s.className='sec';const si=document.createElement('div');si.className='sec-in';
      si.appendChild(head);const e=document.createElement('div');e.className='edit-empty';e.innerHTML='Leçon vide. Utilisez « Ajouter un bloc ».';
      si.appendChild(e);s.appendChild(si);wrap.appendChild(s);
    } else {
      sectionize(wrap,L.blocks,head,(b,idx)=>{
        const slot=document.createElement('div');slot.className='eb-slot'+(b.id===selId?' sel':'')+((b.type==='divider'||b.type==='spacer')?' eb-flush':'')+(b.type==='divider'?' eb-dv':'');slot.dataset.bid=b.id;slot.dataset.idx=idx;slot.draggable=true;
        let rendered;try{rendered=renderBlock(b);}catch(e){rendered=document.createElement('div');rendered.textContent='[Erreur de rendu]';}
        if(b.type==='spacer'&&b.fill==='image'&&b.img){
          slot.classList.add('eb-spos');
          const sb=rendered.querySelector('.spacer-block');
          if(sb){
            sb.addEventListener('pointerdown',ev=>{
              if(ev.target.closest('.sp-txt'))return;
              ev.preventDefault();ev.stopPropagation();
              try{sb.setPointerCapture(ev.pointerId);}catch(e){}
              sb.classList.add('spos-drag');
              const r=sb.getBoundingClientRect();
              const x0=ev.clientX,y0=ev.clientY;
              const bx=(b.imgX==null?50:b.imgX),by=(b.imgY==null?50:b.imgY);
              let nx=bx,ny=by;
              const im=sb.querySelector('.sp-img');
              const move=e2=>{
                nx=Math.max(0,Math.min(100,bx-((e2.clientX-x0)/Math.max(1,r.width))*100));
                ny=Math.max(0,Math.min(100,by-((e2.clientY-y0)/Math.max(1,r.height))*100));
                if(im)im.style.backgroundPosition=nx.toFixed(1)+'% '+ny.toFixed(1)+'%';
              };
              const up=()=>{
                sb.removeEventListener('pointermove',move);sb.removeEventListener('pointerup',up);sb.removeEventListener('pointercancel',up);
                sb.classList.remove('spos-drag');
                post('spos',{id:b.id,x:Math.round(nx*10)/10,y:Math.round(ny*10)/10});
              };
              sb.addEventListener('pointermove',move);sb.addEventListener('pointerup',up);sb.addEventListener('pointercancel',up);
            });
          }
        }
        if((b.type==='hotspot'||b.type==='zoomin')&&b.img){
          slot.classList.add('eb-hot');
          const hw=rendered.querySelector('.hot-wrap');
          if(hw){
            rendered.querySelectorAll('.hot-pop').forEach(x=>x.remove());
            const pct=(ev,r)=>[Math.max(0,Math.min(100,((ev.clientX-r.left)/r.width)*100)),Math.max(0,Math.min(100,((ev.clientY-r.top)/r.height)*100))];
            rendered.querySelectorAll('.hot-pin').forEach((pin,pi)=>{
              pin.classList.add('pin-drag');pin.onclick=e=>{e.stopPropagation();e.preventDefault();};
              pin.addEventListener('pointerdown',ev=>{
                ev.preventDefault();ev.stopPropagation();
                try{pin.setPointerCapture(ev.pointerId);}catch(e){}
                pin.classList.add('dragging');
                let nx=null,ny=null;
                const move=e2=>{const r=hw.getBoundingClientRect();const c=pct(e2,r);nx=c[0];ny=c[1];
                  pin.style.left=nx+'%';pin.style.top=ny+'%';};
                const up=()=>{
                  pin.removeEventListener('pointermove',move);pin.removeEventListener('pointerup',up);pin.removeEventListener('pointercancel',up);
                  pin.classList.remove('dragging');
                  if(nx!=null)post('spot',{id:b.id,spot:(b.spots[pi]||{}).id,x:Math.round(nx*10)/10,y:Math.round(ny*10)/10});
                };
                pin.addEventListener('pointermove',move);pin.addEventListener('pointerup',up);pin.addEventListener('pointercancel',up);
              });
            });
            hw.addEventListener('dblclick',ev=>{ev.preventDefault();ev.stopPropagation();
              const r=hw.getBoundingClientRect();const c=pct(ev,r);
              post('addspot',{id:b.id,x:Math.round(c[0]*10)/10,y:Math.round(c[1]*10)/10});});
            const tip=document.createElement('div');tip.className='hot-tip';
            tip.textContent='Faites glisser les points · double-cliquez sur l\'image pour en ajouter un';
            rendered.appendChild(tip);
          }
        }
        const guard=document.createElement('div');guard.className='eb-guard';
        // Une transition qui chevauche son voisin occupe un rectangle, mais ne DESSINE qu'une forme.
        // Si sa zone de clic reste rectangulaire, elle avale le voisin (un espaceur court disparaît
        // entre deux transitions). On calque donc la zone de clic sur la forme réelle : le reste
        // du rectangle laisse passer le clic vers le bloc du dessous.
        if(b.type==='divider'){
          const dv=rendered.querySelector('.divider-block');
          const vp=rendered.querySelector('.dv-vp');
          if(dv&&vp&&dv.dataset.ov){
            const clone=vp.cloneNode(true);
            clone.style.opacity='0';
            clone.style.position='absolute';clone.style.inset='0';
            clone.style.pointerEvents='none';
            const cs=clone.querySelector('svg');if(cs)cs.style.pointerEvents='none';
            clone.querySelectorAll('path').forEach(pa=>{pa.style.pointerEvents='fill';pa.style.cursor='pointer';});
            guard.appendChild(clone);
            guard.classList.add('eb-guard-shape');
          }
        }
        const inner=document.createElement('div');inner.className='eb-inner';
        inner.appendChild(rendered);inner.appendChild(guard);
        if(b.altFor){
          const ac=document.createElement('span');ac.className='eb-alt';ac.setAttribute('aria-hidden','true');
          ac.textContent='♿ Version accessible';
          ac.title='Ce bloc remplace le bloc précédent quand l\'apprenant active la version accessible.';
          slot.appendChild(ac);slot.classList.add('eb-altblk');
        }
        const fv=(window.__FB__||{})[b.id];
        if(fv){
          const fc2=document.createElement('span');
          fc2.className='eb-fb'+(fv.todo?'':' done');
          fc2.setAttribute('aria-hidden','true');
          fc2.textContent=(fv.todo?'💬 '+fv.todo:'✅ '+fv.n);
          fc2.title=fv.todo?fv.todo+' retour(s) de relecture à traiter':'Tous les retours sont traités';
          slot.appendChild(fc2);
        }
        const av=(window.__A11Y__||{})[b.id];
        if(av){
          const chip=document.createElement('span');
          chip.className='eb-a11y '+av.lv;
          chip.setAttribute('aria-hidden','true');
          chip.textContent=(av.lv==='err'?'⛔':'⚠️')+' '+av.n;
          chip.title=(av.lv==='err'?av.n+' point(s) bloquant(s) pour l\'accessibilité':av.n+' point(s) d\'accessibilité à vérifier')+' — cliquez sur le bloc pour le détail';
          slot.appendChild(chip);
        }
        const tools=document.createElement('div');tools.className='eb-tools';
        tools.innerHTML='<span class="eb-label">'+E((C.__labels&&C.__labels[b.type])||b.type)+'</span>'+
          '<button data-a="up" title="Monter">&#9650;</button>'+
          '<button data-a="down" title="Descendre">&#9660;</button>'+
          '<button data-a="dup" title="Dupliquer">&#10697;</button>'+
          '<button data-a="del" title="Supprimer">&#10005;</button>';
        const ins=document.createElement('button');ins.className='eb-ins';ins.title='Insérer un bloc ici';
        ins.innerHTML='<span>+</span>';
        ins.onclick=e=>{e.stopPropagation();post('insert',{idx:idx});};
        slot.appendChild(ins);
        slot.appendChild(tools);slot.appendChild(inner);
        slot.addEventListener('click',e=>{if(e.target.closest('.eb-tools'))return;post('select',{id:b.id});});
        tools.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();post('action',{id:b.id,act:btn.dataset.a});}));
        slot.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',idx);slot.classList.add('dragging');});
        slot.addEventListener('dragend',()=>slot.classList.remove('dragging'));
        slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drop-target');});
        slot.addEventListener('dragleave',()=>slot.classList.remove('drop-target'));
        slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drop-target');const from=+e.dataTransfer.getData('text/plain');if(from!==idx)post('move',{from:from,to:idx});});
        return slot;
      });
    }
    const addSec=document.createElement('div');addSec.className='sec';
    const addIn=document.createElement('div');addIn.className='sec-in';addSec.appendChild(addIn);wrap.appendChild(addSec);
    const add=document.createElement('button');add.className='eb-add';add.innerHTML='<span>+</span> Ajouter un bloc';
    add.onclick=()=>post('add',{});
    addIn.appendChild(add);
  }
  function post(type,data){try{parent.postMessage(Object.assign({__edit:true,type:type},data),'*');}catch(e){}}

  /* ============ DÉMARRAGE ============ */
  SCORM.init();
  buildShell();
  let start=state.idx||0;if(start>=lessons.length)start=0;
  // si verrouillé, revenir à la première non terminée
  if(lessonState(start)==='locked'){start=lessons.findIndex((_,i)=>lessonState(i)!=='locked');if(start<0)start=0;}
  renderLesson(start);
  window.addEventListener('beforeunload',()=>{persist();SCORM.finish();});
})();</script></body></html>
