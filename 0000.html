
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mon cours</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-primary:#2c2a4a;--c-accent:#c0653a;--c-bg:#f7f4ef;--c-text:#1c1b19;
  --c-panel:#ffffff;--c-line:rgba(0,0,0,.09);--c-soft:rgba(0,0,0,.55);
  --fh:'Fraunces',serif;--fb:'Hanken Grotesk',sans-serif;--rad:14px;
}
.dark{--c-panel:rgba(255,255,255,.04);--c-line:rgba(255,255,255,.12);--c-soft:rgba(255,255,255,.6)}
html,body{height:100%}
body{font-family:var(--fb);background:var(--c-bg);color:var(--c-text);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
a{color:var(--c-accent)}
img{max-width:100%}
.layout{display:flex;min-height:100vh}
/* SIDEBAR NAV */
.side{transition:width .25s ease,padding .25s ease,opacity .2s ease}
.layout.side-collapsed .side{width:0;min-width:0;padding-left:0;padding-right:0;opacity:0;overflow:hidden;border-right:0}
.side-toggle{position:sticky;top:50vh;align-self:flex-start;flex:0 0 16px;width:16px;height:64px;margin-top:20px;z-index:30;border:1px solid var(--c-line);border-left:0;border-radius:0 8px 8px 0;background:var(--c-panel);color:var(--c-soft);cursor:pointer;display:grid;place-items:center;padding:0;transition:background .15s,color .15s}
.side-toggle:hover{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.side-toggle svg{transition:transform .25s ease}
.layout.side-collapsed .side-toggle svg{transform:rotate(180deg)}
@media(max-width:860px){.side-toggle{display:none}}
.side{width:300px;flex-shrink:0;background:var(--c-panel);border-right:1px solid var(--c-line);position:sticky;top:0;height:100vh;overflow-y:auto;padding:26px 18px}
.side .ttl{font-family:var(--fh);font-size:21px;font-weight:600;line-height:1.2;margin-bottom:4px}
.side .auth{font-size:12px;color:var(--c-soft);margin-bottom:18px}
.progbar{height:6px;background:var(--c-line);border-radius:10px;overflow:hidden;margin-bottom:22px}
.progbar>i{display:block;height:100%;background:var(--c-accent);width:0;transition:width .4s;border-radius:10px}
.nav-mod{margin-bottom:8px}
.nav-mod>.m{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--c-soft);padding:10px 10px 6px}
.nav-les{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--c-soft);transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-les:hover{background:var(--c-bg);color:var(--c-text)}
.nav-les.active{background:var(--c-primary);color:#fff}
.nav-les .dot{width:18px;height:18px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;display:grid;place-items:center;opacity:.5}
.nav-les.active .dot{opacity:1}
.nav-les.done .dot{background:var(--c-accent);border-color:var(--c-accent);opacity:1}
.nav-les.done .dot svg{width:10px;height:10px;color:#fff}
.nav-les.locked{opacity:.4;cursor:not-allowed}
.nav-les .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* TOPBAR variant */
.topnav{position:sticky;top:0;z-index:20;background:var(--c-panel);border-bottom:1px solid var(--c-line);padding:0 24px;display:flex;align-items:center;gap:20px;height:64px}
.topnav .ttl{font-family:var(--fh);font-size:18px;font-weight:600}
.topnav .tn-mid{flex:1;display:flex;gap:6px;overflow-x:auto}
.topnav .tn-les{padding:8px 14px;border-radius:30px;font-size:13px;font-weight:600;color:var(--c-soft);white-space:nowrap;cursor:pointer;border:none;background:none;font-family:inherit}
.topnav .tn-les.active{background:var(--c-primary);color:#fff}
.topnav .tn-les.locked{opacity:.4;cursor:not-allowed}
/* MAIN */
.main{flex:1;min-width:0}
.content{max-width:none;margin:0;padding:0;position:relative;z-index:1}
.sec{display:flow-root;position:relative}
.sec.has-bg{padding:44px 0;background-position:center}
.sec-in{max-width:var(--cw,720px);margin:0 auto;padding:0 28px}
.sec-in:empty{display:none}
.content>.sec:first-child .sec-in:first-child{padding-top:54px}
.content>.sec:last-child{padding-bottom:100px}
.sec>.b{margin-bottom:0}
.sec.no-pt{padding-top:0}
.sec.sec-flush{padding:0}
.sec.no-pb{padding-bottom:0}
.content>.b,.edit-content>.b{margin:0}
.content>.b>*,.edit-content>.b>*{margin:0}
.edit-content>.eb-slot{margin:0}
.eb-slot.eb-flush{border:0!important;border-radius:0!important;margin:0!important;padding:0!important}
/* Une transition chevauche ses voisins. Son bloc voisin la recouvre visuellement (voulu :
   la photo passe par-dessus), mais sa couche de clic la rendait aussi inatteignable.
   On remonte donc UNIQUEMENT la zone de clic et les outils, jamais le dessin :
   sinon le fond opaque de la transition masquerait la photo de l'espaceur. */
.eb-slot.eb-dv .eb-guard{z-index:8!important}
/* zone de clic épousant la forme : le rectangle laisse passer, seule la forme capte */
.eb-guard-shape{pointer-events:none}
.eb-guard-shape>*{pointer-events:none}
.eb-slot.eb-dv .eb-tools{z-index:14}
.eb-slot.eb-dv .eb-a11y,.eb-slot.eb-dv .eb-fb,.eb-slot.eb-dv .eb-alt{z-index:14}
.eb-slot.eb-flush>.eb-inner{padding:0!important}
.eb-hot .eb-guard,.eb-spos .eb-guard{pointer-events:none}
.eb-spos .spacer-block{cursor:grab;touch-action:none}
.eb-spos .spacer-block.spos-drag{cursor:grabbing}
.eb-hot .hot-wrap.hot-hidden .hot-pin{opacity:.6!important;animation:none}
.eb-hot .hot-pin.hot-locked{opacity:.6!important;filter:none;cursor:grab}
.hot-pin.pin-drag{cursor:grab;touch-action:none}
.hot-pin.pin-drag:hover{transform:translate(-50%,-50%) scale(1.15)}
.hot-pin.dragging{cursor:grabbing;transform:translate(-50%,-50%) scale(1.25);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.hot-tip{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:13;margin:0;padding:5px 11px;border-radius:8px;background:rgba(28,27,25,.82);color:#fff;font-size:11.5px;text-align:center;font-style:normal;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.eb-slot:hover .hot-tip{opacity:1}
.eb-slot.eb-flush.sel{outline:2px solid var(--c-primary);outline-offset:-2px}
.les-kicker{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--c-accent);margin-bottom:10px}
.les-h1{font-family:var(--fh);font-size:clamp(28px,5vw,42px);font-weight:600;line-height:1.12;letter-spacing:-.5px;margin-bottom:34px}
/* blocks */
.b{margin-bottom:30px;animation:rise .5s both}
.b.gated,.sec-hidden{display:none}
.b-instr{display:flex;align-items:flex-start;gap:8px;margin:0 0 14px;padding:0;background:none;border:0;border-radius:0;font-family:var(--fb);font-size:13.5px;line-height:1.5;color:inherit;opacity:.85;font-style:normal;font-weight:400;text-align:left}
.bi-ic{font-size:15px;line-height:1.4;flex-shrink:0;font-style:normal}
.bi-tx{flex:1}
.b-instr+*{margin-top:0}
@media(max-width:640px){.b-instr{font-size:13px}}
.cont-wrap{padding:6px 0}
.b.cont-used .cont-btn{opacity:.45;pointer-events:none}
.b.cont-used .cont-btn svg{transform:rotate(180deg)}
.b.rv{animation:none;opacity:0}
.b.rv-fade{transition:opacity var(--rvs,.55s) ease}
.b.rv-up{transform:translateY(26px);transition:opacity var(--rvs,.55s) ease,transform var(--rvs,.55s) cubic-bezier(.22,.61,.36,1)}
.b.rv-zoom{transform:scale(.965);transition:opacity var(--rvs,.55s) ease,transform var(--rvs,.55s) cubic-bezier(.22,.61,.36,1)}
.b.rv-blur{filter:blur(7px);transition:opacity var(--rvs,.55s) ease,filter var(--rvs,.55s) ease}
.b.rv.rv-in{opacity:1;transform:none;filter:none}
@media(prefers-reduced-motion:reduce){.b.rv{opacity:1;transform:none;filter:none;transition:none}}
@keyframes rise{from{opacity:0;transform:translateY(12px)}}
.b.locked{filter:blur(5px);opacity:.4;pointer-events:none;user-select:none}
.bh{font-family:var(--fh);font-weight:600;line-height:1.2}
.bh1{font-size:30px}.bh2{font-size:24px}.bh3{font-size:19px}
.bp{font-size:16.5px;line-height:1.7}
.bquote{border-left:4px solid var(--c-accent);padding:6px 0 6px 22px;font-family:var(--fh);font-style:italic;font-size:21px;line-height:1.5}
.bquote .au{display:block;font-style:normal;font-size:14px;font-family:var(--fb);color:var(--c-soft);margin-top:10px;font-weight:600}
.blist{list-style:none;display:flex;flex-direction:column;gap:9px}
.blist li{display:flex;gap:12px;align-items:flex-start;font-size:16px}
.blist li .mk{flex-shrink:0;color:var(--c-accent);font-weight:700}
.bcols{display:grid;grid-template-columns:1fr 1fr;gap:26px}
@media(max-width:640px){.bcols{grid-template-columns:1fr}}
.card{background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);overflow:hidden}
/* accordion */
.acc-item{border:1px solid var(--c-line);border-radius:var(--rad);margin-bottom:10px;overflow:hidden;background:var(--c-panel)}
.acc-head{padding:16px 18px;font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.acc-head .ci{margin-left:auto;transition:.25s;color:var(--c-accent)}
.acc-item.open .acc-head .ci{transform:rotate(45deg)}
.acc-body{max-height:0;overflow:hidden;transition:.3s;padding:0 18px}
.acc-item.open .acc-body{max-height:1000px;padding:0 18px 18px}
/* tabs */
.tabs-head{display:flex;gap:4px;border-bottom:1px solid var(--c-line);margin-bottom:18px;overflow-x:auto}
.tab-btn{padding:12px 18px;font-weight:700;font-size:14px;color:var(--c-soft);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;margin-bottom:-1px}
.tab-btn.active{color:var(--c-primary);border-bottom-color:var(--c-accent)}
.dark .tab-btn.active{color:var(--c-accent)}
.tab-pane{display:none;font-size:16px}.tab-pane.active{display:block;animation:rise .35s both}
.tabs-wrap.framed .tabs-body{background:var(--c-panel);border:1px solid var(--c-line);border-radius:0 var(--rad) var(--rad) var(--rad);padding:22px}
.tabs-wrap.framed .tabs-head{border-bottom:0;gap:2px}
.tabs-wrap.framed .tab-btn{border:1px solid transparent;border-bottom:0;border-radius:var(--rad) var(--rad) 0 0;margin-bottom:-1px}
.tabs-wrap.framed .tab-btn.active{background:var(--c-panel);border-color:var(--c-line);color:var(--c-primary)}
/* flashcards */
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--fcw,200px),1fr));gap:14px}
.flash-grid.fc-s{--fcw:150px}
.flash-grid.fc-m{--fcw:200px}
.flash-grid.fc-l{--fcw:270px}
.flash-grid.fc-xl{--fcw:340px}
.flash-grid.fc-s .flash{min-height:130px}
.flash-grid.fc-l .flash{min-height:210px}
.flash-grid.fc-xl .flash{min-height:260px}
.flash-grid.fc-center.fc-s .flash{flex:0 0 150px;max-width:150px}
.flash-grid.fc-center.fc-l .flash{flex:0 0 270px;max-width:270px}
.flash-grid.fc-center.fc-xl .flash{flex:0 0 340px;max-width:340px}
.flash{height:180px;perspective:1200px;cursor:pointer}
.flash-in{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flash.flip .flash-in{transform:rotateY(180deg)}
.flash-f,.flash-b{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rad);display:grid;place-items:center;padding:20px;text-align:center}
.flash-f{background:var(--c-primary);color:#fff;font-family:var(--fh);font-size:19px;font-weight:600}
.flash-b{background:var(--c-panel);border:1px solid var(--c-line);transform:rotateY(180deg);font-size:15px;line-height:1.5}
.flash .hintf{position:absolute;bottom:8px;right:12px;font-size:10px;opacity:.6;font-family:var(--fb);font-weight:400}
/* timeline */
.tl{position:relative}
.tl-left{padding-left:36px}
.tl-left::before{content:'';position:absolute;left:11px;top:6px;bottom:6px;width:2px;background:var(--c-line)}
.tl-left .tl-item{position:relative;margin-bottom:26px}
.tl-left .tl-dot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--c-accent);box-shadow:0 0 0 4px var(--c-bg)}
.tl-right{padding-right:36px;text-align:right}
.tl-right::before{content:'';position:absolute;right:11px;top:6px;bottom:6px;width:2px;background:var(--c-line)}
.tl-right .tl-item{position:relative;margin-bottom:26px}
.tl-right .tl-dot{position:absolute;right:-25px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--c-accent);box-shadow:0 0 0 4px var(--c-bg)}
.tl-center{padding:0}
.tl-center::before{content:'';position:absolute;left:50%;top:6px;bottom:6px;width:2px;background:var(--c-line);transform:translateX(-50%)}
.tl-center .tl-item{position:relative;width:50%;margin-bottom:26px;box-sizing:border-box}
.tl-center .tl-item:nth-child(odd){left:0;padding-right:30px;text-align:right}
.tl-center .tl-item:nth-child(even){left:50%;padding-left:30px}
.tl-center .tl-dot{position:absolute;top:4px;width:14px;height:14px;border-radius:50%;background:var(--c-accent);box-shadow:0 0 0 4px var(--c-bg)}
.tl-center .tl-item:nth-child(odd) .tl-dot{right:-7px}
.tl-center .tl-item:nth-child(even) .tl-dot{left:-7px}
.tl-date{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--c-accent)}
.tl-title{font-family:var(--fh);font-size:18px;font-weight:600;margin:2px 0 5px}
.tl-body{color:var(--c-soft);font-size:15px}
@media(max-width:640px){
  .tl-center{padding-left:36px}
  .tl-center::before{left:11px;transform:none}
  .tl-center .tl-item{width:auto;left:0!important;padding:0 0 0 0!important;text-align:left!important}
  .tl-center .tl-dot{left:-25px!important;right:auto!important}
}
/* scenario */
.scen{background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);padding:24px}
.scen-q{font-family:var(--fh);font-size:19px;margin-bottom:18px}
.scen-choice{display:block;width:100%;text-align:left;padding:15px 18px;border:1.5px solid var(--c-line);border-radius:11px;margin-bottom:10px;cursor:pointer;font-weight:600;font-size:15px;background:var(--c-bg);transition:.15s;font-family:inherit;color:inherit}
.scen-choice:hover{border-color:var(--c-accent)}
.scen-choice.picked{border-color:var(--c-accent);background:var(--c-accent);color:#fff}
.scen-fb{margin-top:14px;padding:16px;border-radius:11px;background:var(--c-bg);border-left:3px solid var(--c-accent);font-size:15px;display:none}
.scen-fb.show{display:block;animation:rise .35s both}
/* hotspot */
.hot-wrap{position:relative;border-radius:var(--rad);overflow:hidden;border:1px solid var(--c-line)}
.hot-wrap img{display:block;width:100%}
.hot-wrap.hot-hidden .hot-pin{opacity:0;animation:none;box-shadow:none;cursor:default}
.hot-wrap.hot-hidden .hot-pin.opened{opacity:1;cursor:pointer}
.hot-pin.hot-locked{opacity:.3;filter:grayscale(1);cursor:pointer;animation:none}
.hot-wrap.hot-hidden .hot-pin.hot-locked{opacity:0;cursor:default}
@keyframes hshake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-60%,-50%)}75%{transform:translate(-40%,-50%)}}
.hot-pin.shake{animation:hshake .38s}
/* ===== Dézoom ===== */
.zo-wrap{position:relative;overflow:hidden;background:#0d0c0b}
.zo-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .12s linear}
.zo-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:12px}
.zo-hint{font-size:13.5px;color:var(--c-soft)}
.zo-ctl{display:flex;align-items:center;gap:9px;flex:1;min-width:180px;max-width:340px}
.zo-ic{color:var(--c-soft);display:grid;place-items:center}
.zo-range{flex:1;accent-color:var(--c-accent);direction:rtl}
.zo-pc{font-size:12.5px;font-weight:700;color:var(--c-soft);min-width:34px;font-variant-numeric:tabular-nums}
.zo-cap{margin-top:12px;padding:14px 16px;border-radius:var(--rad);background:var(--c-panel);border-left:3px solid var(--c-accent);font-size:14.5px;line-height:1.6;opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s;pointer-events:none}
.zo-cap.show{opacity:1;transform:none;pointer-events:auto}
/* ===== Zoom sur points ===== */
.zi-wrap{position:relative}
.zi-stage{overflow:hidden;border-radius:var(--rad);line-height:0}
.zi-img{width:100%;display:block;transition:transform .5s cubic-bezier(.22,.61,.36,1);transform-origin:50% 50%}
.zi-panel{position:absolute;z-index:6;width:min(46%,290px);padding:14px 16px;border-radius:12px;background:var(--c-panel);box-shadow:0 8px 28px rgba(0,0,0,.3);font-size:14px;line-height:1.55;opacity:0;visibility:hidden;transition:opacity .3s;border:1px solid var(--c-line)}
.zi-panel.show{opacity:1;visibility:visible}
.zi-panel.zi-left{left:16px}
.zi-panel.zi-right{right:16px}
.zi-panel.zi-top{top:16px}
.zi-panel.zi-bottom{bottom:56px}
.zi-t{display:block;font-family:var(--fh);font-size:15px;margin-bottom:5px;color:var(--c-primary)}
.zi-close{position:absolute;top:6px;right:8px;border:0;background:transparent;color:var(--c-soft);cursor:pointer;font-size:13px;line-height:1;padding:3px}
.zi-reset{position:absolute;left:12px;bottom:12px;z-index:6;display:none;align-items:center;gap:6px;padding:7px 11px;border-radius:8px;border:1px solid var(--c-line);background:var(--c-panel);color:var(--c-text);font-family:var(--fb);font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.zi-wrap.zi-on .zi-reset{display:inline-flex}
.zi-wrap.zi-on .hot-pin{opacity:.25}
.zi-wrap.zi-on .hot-pin.opened{opacity:1}
/* ===== Roue aléatoire ===== */
.wh-block{text-align:center}
.wh-prompt{font-family:var(--fh);font-size:17px;font-weight:600;margin-bottom:16px}
.wh-stage{position:relative;margin:0 auto;aspect-ratio:1/1;width:100%}
.wh-disc{width:100%;height:100%;filter:drop-shadow(0 10px 26px rgba(0,0,0,.22));will-change:transform}
.wh-disc svg{width:100%;height:100%;display:block}
.wh-needle{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:3;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:24px solid var(--c-text);filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
.wh-needle::after{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--c-text)}
.wh-hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;width:27%;height:27%;border-radius:50%;border:4px solid var(--c-panel);background:var(--c-text);color:var(--c-bg);font-family:var(--fb);font-weight:800;cursor:pointer;display:grid;place-items:center;padding:0;box-shadow:0 5px 18px rgba(0,0,0,.3);transition:transform .18s,filter .18s}
.wh-hub span{font-size:clamp(10px,2.6vw,13px);line-height:1.15;padding:0 4px}
.wh-hub:hover:not(:disabled){transform:translate(-50%,-50%) scale(1.06)}
.wh-hub:active:not(:disabled){transform:translate(-50%,-50%) scale(.96)}
.wh-hub.spinning{filter:grayscale(.4);cursor:default}
.wh-hub.done{opacity:.55;cursor:default}
.wh-res{max-height:0;overflow:hidden;opacity:0;transition:max-height .5s ease,opacity .4s ease,margin .4s}
.wh-res.show{max-height:600px;opacity:1;margin-top:22px}
.wh-res-in{padding:18px 20px;border-radius:var(--rad);background:var(--c-panel);border:1px solid var(--c-line);border-top:3px solid var(--c-accent);text-align:left}
.wh-rt{display:block;font-family:var(--fh);font-size:18px;font-weight:600;color:var(--c-accent);margin-bottom:6px}
.wh-rb{font-size:14.5px;line-height:1.6}
@media(prefers-reduced-motion:reduce){.wh-disc{transition:none!important}}
/* ===== Carte à gratter ===== */
.sc-wrap{position:relative;overflow:hidden;background:var(--c-panel);border:1px solid var(--c-line)}
.sc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.sc-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px 26px;font-family:var(--fh);font-size:19px;line-height:1.45}
.sc-cv{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;touch-action:none;transition:opacity .6s}
.sc-cv.sc-done{opacity:0;pointer-events:none}
.ba-wrap{position:relative;overflow:hidden;user-select:none;touch-action:none;cursor:ew-resize;line-height:0}
.ba-base{display:block;width:100%;height:auto}
.ba-clip{position:absolute;top:0;left:0;bottom:0;width:50%;overflow:hidden}
.ba-clip img{position:absolute;top:0;left:0;height:100%;max-width:none;object-fit:cover;display:block}
.ba-handle{position:absolute;top:0;bottom:0;width:3px;background:#fff;transform:translateX(-50%);box-shadow:0 0 10px rgba(0,0,0,.4);cursor:ew-resize;outline:none}
.ba-handle:focus-visible{box-shadow:0 0 0 3px var(--c-accent)}
.ba-knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:#fff;color:#1c1b19;display:grid;place-items:center;box-shadow:0 3px 12px rgba(0,0,0,.35);border:2px solid rgba(0,0,0,.08)}
.ba-handle:hover .ba-knob{background:var(--c-accent);color:#fff}
.ba-wrap.ba-drag .ba-knob{transform:translate(-50%,-50%) scale(1.08)}
.ba-lab{position:absolute;top:12px;margin-left:10px;padding:5px 10px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:700;letter-spacing:.4px;line-height:1.2;pointer-events:none}

.hot-pin{position:absolute;width:30px;height:30px;border-radius:50%;background:var(--c-accent);color:#fff;border:3px solid #fff;transform:translate(-50%,-50%);cursor:pointer;display:grid;place-items:center;font-weight:800;box-shadow:0 3px 10px rgba(0,0,0,.3);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,101,58,.5)}70%{box-shadow:0 0 0 12px rgba(192,101,58,0)}100%{box-shadow:0 0 0 0 rgba(192,101,58,0)}}
.hot-pop{position:absolute;z-index:5;background:#fff;color:#1c1b19;border-radius:11px;padding:14px 16px;width:230px;box-shadow:0 12px 40px rgba(0,0,0,.25);transform:translate(-50%,12px);font-size:14px;display:none}
.hot-pop.show{display:block}
.hot-pop b{display:block;margin-bottom:4px;font-family:var(--fh)}
/* carousel */
.car{position:relative;border-radius:var(--rad);overflow:hidden;background:var(--c-panel);border:1px solid var(--c-line)}
.car-track{display:flex;transition:transform .4s}
.car-slide{min-width:100%}
.car-slide img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;background:var(--c-bg)}
.car-cap{padding:14px 18px;font-size:14px;color:var(--c-soft);text-align:center}
.car-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;display:grid;place-items:center}
.car-nav.prev{left:12px}.car-nav.next{right:12px}
.car-dots{display:flex;justify-content:center;gap:6px;padding:0 0 14px}
.car-dots>span{width:8px;height:8px;border-radius:50%;background:var(--c-line);cursor:pointer}
.car-dots>span.on{background:var(--c-accent)}
/* button */
.bbtn{display:inline-block;padding:13px 26px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;cursor:pointer;transition:.15s;border:2px solid var(--c-primary)}
.bbtn.solid{background:var(--c-primary);color:#fff}
.bbtn.outline{color:var(--c-primary);background:transparent}
.dark .bbtn.outline{color:var(--c-accent);border-color:var(--c-accent)}
.bbtn.soft{background:var(--c-panel);color:var(--c-primary);border-color:var(--c-line)}
.bbtn:hover{transform:translateY(-2px)}
/* media */
figure figcaption{font-size:13px;color:var(--c-soft);text-align:center;margin-top:9px;font-style:italic}
.img-full img{width:100%;border-radius:var(--rad)}
.img-medium{max-width:480px;margin:0 auto}.img-medium img{width:100%;border-radius:var(--rad)}
.img-small{max-width:280px}.img-small img{width:100%;border-radius:var(--rad)}
.gal{display:grid;gap:10px}
.gal img{width:100%;height:100%;object-fit:cover;border-radius:10px;aspect-ratio:1;cursor:pointer}
.vid-wrap{position:relative;border-radius:var(--rad);overflow:hidden;background:#000;aspect-ratio:16/9}
.vid-wrap iframe,.vid-wrap video{position:absolute;inset:0;width:100%;height:100%;border:none}
.audio-card{background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);padding:18px;display:flex;align-items:center;gap:16px}
.audio-card .ai{width:48px;height:48px;border-radius:12px;background:var(--c-primary);color:#fff;display:grid;place-items:center;flex-shrink:0}
.audio-card audio{flex:1}
.attach-card{display:flex;align-items:center;gap:14px;background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);padding:16px 18px;text-decoration:none;color:inherit;transition:.15s}
.attach-card:hover{border-color:var(--c-accent)}
.attach-card .fi{width:44px;height:44px;border-radius:11px;background:var(--c-accent);color:#fff;display:grid;place-items:center;flex-shrink:0}
.attach-card .fn{font-weight:700}.attach-card .fm{font-size:12px;color:var(--c-soft)}
/* quiz */
.quiz{background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);padding:24px}
.quiz-q{font-family:var(--fh);font-size:19px;font-weight:600;margin-bottom:4px}
.quiz-sub{font-size:12px;color:var(--c-soft);margin-bottom:16px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.opt{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1.5px solid var(--c-line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.13s;font-size:15px;font-weight:500}
.opt:hover{border-color:var(--c-accent)}
.opt .mark{width:22px;height:22px;border:2px solid var(--c-line);flex-shrink:0;display:grid;place-items:center;transition:.13s}
.opt[data-shape=circle] .mark{border-radius:50%}
.opt[data-shape=square] .mark{border-radius:6px}
.opt.sel{border-color:var(--c-accent)}
.opt.sel .mark{background:var(--c-accent);border-color:var(--c-accent)}
.opt.sel .mark svg{width:12px;height:12px;color:#fff}
.opt.correct{border-color:#3f7d5b;background:rgba(63,125,91,.08)}
.opt.wrong{border-color:#b34a4a;background:rgba(179,74,74,.08)}
.opt.locked{cursor:default}
.match-wrap{display:flex;flex-direction:column;gap:10px}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.match-left{padding:13px 15px;background:var(--c-bg);border:1px solid var(--c-line);border-radius:10px;font-weight:600;font-size:14px}
.match-row select{padding:12px;border:1.5px solid var(--c-line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--c-panel);color:inherit;width:100%}
.match-row .arr{color:var(--c-soft)}
.blank-text{font-size:17px;line-height:2.4}
.blank-text input{display:inline-block;width:120px;padding:6px 10px;border:none;border-bottom:2px solid var(--c-accent);background:var(--c-bg);font-family:inherit;font-size:15px;text-align:center;border-radius:6px 6px 0 0;color:inherit}
.blank-text input.ok{border-color:#3f7d5b;background:rgba(63,125,91,.1)}
.blank-text input.ko{border-color:#b34a4a;background:rgba(179,74,74,.1)}
.quiz-actions{margin-top:18px;display:flex;gap:12px;align-items:center}
.quiz-check{padding:12px 24px;background:var(--c-primary);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.quiz-check:disabled{opacity:.4;cursor:not-allowed}
.quiz-retry{padding:12px 18px;background:none;border:1.5px solid var(--c-line);border-radius:10px;font-weight:600;cursor:pointer;color:inherit;font-family:inherit;display:none}
.quiz-fb{margin-top:16px;padding:16px 18px;border-radius:11px;font-size:15px;display:none;animation:rise .3s both}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:rgba(63,125,91,.12);border-left:3px solid #3f7d5b}
.quiz-fb.no{background:rgba(179,74,74,.12);border-left:3px solid #b34a4a}
.quiz-fb b{display:block;margin-bottom:3px}
/* chart */
.chart-card{background:var(--c-panel);border:1px solid var(--c-line);border-radius:var(--rad);padding:22px}
.grid-ttl{font-family:var(--fh);font-size:17px;font-weight:600;margin-bottom:10px}
.grid-wrap{overflow-x:auto;border:1px solid var(--c-line);border-radius:var(--rad)}
.grid-tbl{width:100%;table-layout:fixed;border-collapse:collapse;font-size:15px;background:var(--c-panel)}
.grid-tbl th,.grid-tbl td{word-wrap:break-word;overflow-wrap:anywhere;padding:11px 14px;border-bottom:1px solid var(--c-line);border-right:1px solid var(--c-line)}
.grid-tbl th:last-child,.grid-tbl td:last-child{border-right:0}
.grid-tbl tr:last-child th,.grid-tbl tr:last-child td{border-bottom:0}
.grid-tbl th{background:var(--c-primary);color:#fff;font-weight:700;font-size:13.5px;letter-spacing:.2px}
.grid-tbl td:first-child:not(:only-child){font-weight:500}
.grid-tbl.striped tr:nth-child(even) td{background:rgba(0,0,0,.035)}
.grid-tbl.compact th,.grid-tbl.compact td{padding:7px 10px;font-size:14px}
.ch-sum{margin-top:12px;font-size:14px;line-height:1.55;color:var(--c-text)}
.ch-leg{list-style:none;display:flex;flex-wrap:wrap;gap:8px 16px;margin:12px 0 0;padding:0}
.ch-leg li{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--c-text)}
.ch-sw{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.ch-data{margin-top:14px}
.ch-tog{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid var(--c-line);background:transparent;color:var(--c-text);font-family:var(--fb);font-size:12.5px;font-weight:600;cursor:pointer}
.ch-tog:hover{border-color:var(--c-accent);color:var(--c-accent)}
.ch-tog svg{transition:transform .2s}
.ch-tog.open svg{transform:rotate(180deg)}
.ch-tbl{margin-top:10px}
.ch-src{margin-top:10px;font-size:11.5px;color:var(--c-soft);font-style:italic}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.chart-card.no-frame{background:transparent;border:0;padding:0;box-shadow:none}
/* ===== Document de notes (aperçu + PDF) ===== */
.np-ov{position:fixed;inset:0;z-index:120;background:rgba(20,18,16,.55);display:flex;flex-direction:column;overscroll-behavior:contain}
.np-bar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:var(--c-panel);border-bottom:1px solid var(--c-line);flex-wrap:wrap}
.np-bt{font-family:var(--fh);font-weight:600;font-size:15px}
.np-acts{display:flex;gap:8px;flex-wrap:wrap}
.np-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--c-primary);background:var(--c-primary);color:#fff;font-family:var(--fb);font-size:13.5px;font-weight:600;cursor:pointer}
.np-btn.ghost{background:transparent;color:var(--c-text);border-color:var(--c-line)}
.np-btn:hover{opacity:.9}
.np-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:24px 16px 60px;display:flex;justify-content:center;align-items:flex-start}
.np-page{width:100%;max-width:760px;flex:0 0 auto;background:#fff;color:#1c1b19;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.3);padding:46px 48px 60px;font-family:var(--fb)}
.np-head{border-bottom:3px solid var(--c-accent);padding-bottom:18px;margin-bottom:26px}
.np-logo{max-height:44px;max-width:150px;object-fit:contain;margin-bottom:14px;display:block}
.np-kick{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--c-accent);margin-bottom:5px}
.np-page h1{font-family:var(--fh);font-size:28px;font-weight:600;color:var(--c-primary);margin-bottom:6px;line-height:1.2}
.np-meta{font-size:12.5px;color:#6b675f}
.np-sec{margin-bottom:30px;break-inside:auto}
.np-sec h2{font-family:var(--fh);font-size:17px;font-weight:600;color:var(--c-primary);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #e6e1d8}
.np-item{margin-bottom:18px;padding-left:12px;border-left:3px solid var(--c-accent);break-inside:avoid}
.np-q{font-weight:700;font-size:14px;margin-bottom:5px}
.np-a{font-size:14.5px;line-height:1.6;white-space:pre-wrap}
.np-a.np-none{color:#9a958c;font-style:italic}
.np-src{font-size:11px;color:#9a958c;margin-top:5px}
.np-pits{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.np-pit{padding:6px 10px;border-radius:6px;font-size:13.5px;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.np-hl{list-style:none;margin-top:4px}
.np-hl li{margin-bottom:5px;font-size:14px;line-height:1.55}
.np-hl li span{padding:1px 3px;border-radius:2px}
.np-empty{color:#9a958c;font-style:italic;padding:20px 0}
.np-foot{margin-top:34px;padding-top:12px;border-top:1px solid #e6e1d8;font-size:11px;color:#9a958c;text-align:center}
@media print{
  body.np-open>*{display:none!important}
  body.np-open .np-ov{display:block!important;position:static;background:none}
  .np-bar{display:none!important}
  .np-scroll{overflow:visible;padding:0;display:block}
  .np-page{max-width:none;box-shadow:none;border-radius:0;padding:0}
  .np-item{break-inside:avoid}
  @page{margin:16mm}
}
/* ===== Version accessible alternative ===== */
.b.alt-block{display:none}
body.a11y-alt .b.alt-block{display:block}
body.a11y-alt .b.has-alt{display:none}
.alt-skip{position:fixed;top:8px;left:8px;z-index:400;padding:12px 18px;border-radius:10px;border:2px solid var(--c-accent);background:var(--c-accent);color:#fff;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;transform:translateY(-200%);transition:transform .18s ease;box-shadow:0 6px 22px rgba(0,0,0,.3)}
.alt-skip:focus{transform:translateY(0);outline:3px solid #fff;outline-offset:2px}
.html-block{width:100%}
.html-ph{margin-top:10px;padding:14px 16px;border:1px dashed var(--c-line);border-radius:var(--rad);text-align:center;color:var(--c-soft)}
.html-ph b{display:block;font-family:var(--fh);font-size:14px;color:var(--c-text)}
.html-ph span{display:block;font-size:12px;margin-top:3px}
.alt-btn{display:flex;align-items:center;gap:8px;width:100%;margin-top:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--c-line);background:transparent;color:var(--c-text);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;text-align:left}
.alt-btn:hover{border-color:var(--c-accent);color:var(--c-accent)}
.alt-btn.on{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.alt-ic{font-size:15px;line-height:1}
.alt-tx{flex:1}
/* ===== Mode relecture ===== */
body.rv-on{padding-bottom:64px}
.rv-bar{position:fixed;left:0;right:0;bottom:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 18px;background:var(--c-panel);border-top:2px solid #4a6fa5;box-shadow:0 -4px 18px rgba(0,0,0,.14)}
.rv-badge{padding:3px 9px;border-radius:6px;background:#4a6fa5;color:#fff;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.rv-info{font-size:12.5px;color:var(--c-soft);flex:1;min-width:150px}
.rv-save{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:8px;border:1px solid #4a6fa5;background:#4a6fa5;color:#fff;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer}
.rv-save:hover{opacity:.9}
.rv-tag{position:absolute;top:6px;right:6px;z-index:20;display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;border:1px dashed #4a6fa5;background:var(--c-panel);color:#4a6fa5;font-family:var(--fb);font-size:11.5px;font-weight:700;cursor:pointer;opacity:.35;transition:opacity .15s}
.b:hover .rv-tag,.rv-tag.has{opacity:1}
.rv-tag.has{border-style:solid;background:#4a6fa5;color:#fff}
.rv-c{font-variant-numeric:tabular-nums}
body.rv-on .b{position:relative}
.rv-ov{position:fixed;inset:0;z-index:150;background:rgba(20,18,16,.55);display:flex;align-items:center;justify-content:center;padding:20px}
.rv-modal{width:100%;max-width:540px;max-height:84vh;display:flex;flex-direction:column;background:var(--c-bg);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.rv-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--c-panel);border-bottom:1px solid var(--c-line)}
.rv-head b{font-family:var(--fh);font-size:16px;display:block}
.rv-head span{font-size:12px;color:var(--c-soft)}
.rv-x{border:0;background:transparent;color:var(--c-soft);font-size:15px;cursor:pointer;padding:5px}
.rv-body{flex:1 1 auto;min-height:0;overflow-y:auto;padding:16px 18px 20px}
.rv-empty{font-size:13px;color:var(--c-soft);font-style:italic;margin-bottom:12px}
.rv-item{padding:10px 12px;border-radius:8px;background:var(--c-panel);border:1px solid var(--c-line);margin-bottom:8px}
.rv-meta{display:flex;align-items:baseline;gap:8px}
.rv-meta b{font-size:12.5px}
.rv-meta span{font-size:11px;color:var(--c-soft);flex:1}
.rv-del{border:0;background:transparent;color:var(--c-soft);cursor:pointer;font-size:11px}
.rv-item p{font-size:13.5px;line-height:1.5;margin-top:5px;white-space:pre-wrap}
.rv-lab{display:block;font-size:12px;font-weight:700;margin:14px 0 5px;color:var(--c-soft)}
.rv-ta{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--c-line);background:var(--c-panel);color:var(--c-text);font-family:var(--fb);font-size:14px;resize:vertical}
.rv-acts{margin-top:10px;text-align:right}
.rv-add{padding:9px 16px;border-radius:8px;border:0;background:#4a6fa5;color:#fff;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer}
@media print{.rv-bar,.rv-tag{display:none}}
/* ===== Badges ===== */
.bd-btn{display:flex;align-items:center;gap:8px;width:100%;margin-top:16px;padding:10px 12px;border-radius:10px;border:1px solid var(--c-line);background:transparent;color:var(--c-text);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;text-align:left}
.bd-btn:hover{border-color:var(--c-accent);color:var(--c-accent)}
.bd-btn span:first-of-type{flex:1}
.bd-n{font-size:11.5px;font-weight:800;color:var(--c-soft);font-variant-numeric:tabular-nums}
.bd-ov{position:fixed;inset:0;z-index:130;background:rgba(20,18,16,.55);display:flex;align-items:center;justify-content:center;padding:20px}
.bd-modal{width:100%;max-width:680px;max-height:86vh;display:flex;flex-direction:column;background:var(--c-bg);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.bd-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--c-panel);border-bottom:1px solid var(--c-line)}
.bd-head b{font-family:var(--fh);font-size:17px;display:block}
.bd-head span{font-size:12.5px;color:var(--c-soft)}
.bd-x{border:0;background:transparent;color:var(--c-soft);font-size:15px;cursor:pointer;padding:5px}
.bd-body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.bd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.bd-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;padding:16px 12px;border-radius:12px;background:var(--c-panel);border:1px solid var(--c-line)}

  const lessons=[]; C.modules.forEach(m=>m.lessons.forEach(l=>lessons.push({m,l})));
  const STORE_KEY='atelier_'+(C.meta.title||'cours').replace(/\W+/g,'_');
  let state={done:{},quiz:{},notes:{},postits:{},hl:{},badges:{},stats:{time:0,dl:0,spots:{},scratch:{},flip:{},slider:{}},idx:0};
  function load(){
    try{
      if(IS_SCORM){const d=SCORM.get('cmi.suspend_data');if(d)state=Object.assign(state,JSON.parse(decodeURIComponent(d)));}

    }catch(e){}
  }
  let _bdBusy=false;
  function persist(){
    _persist0();
    if(!_bdBusy){_bdBusy=true;try{checkBadges();}catch(e){}finally{_bdBusy=false;}}
  }
  function _persist0(){
    try{
      const data=JSON.stringify(state);
      if(IS_SCORM){SCORM.set('cmi.suspend_data',encodeURIComponent(data));reportScore();SCORM.save();}
      else if(!PREVIEW){localStorage.setItem(STORE_KEY,data);}
    }catch(e){}
  }

  /* ---- SCORM 1.2 API ---- */
  const SCORM=(function(){
    let api=null,ok=false;
    function find(w){let n=0;while(w&&n<12){if(w.API)return w.API;w=w.parent===w?null:w.parent;n++;}return null;}
    function get(){if(api)return api;api=find(window)||(window.opener?find(window.opener):null);return api;}
    return {
      init(){if(!IS_SCORM)return;const a=get();if(a){a.LMSInitialize('');ok=true;const s=a.LMSGetValue('cmi.core.lesson_status');if(!s||s==='not attempted'||s==='unknown')a.LMSSetValue('cmi.core.lesson_status','incomplete');a.LMSCommit('');}},
      get(k){if(!IS_SCORM)return'';const a=get();return a&&ok?a.LMSGetValue(k):'';},
      set(k,v){if(!IS_SCORM)return;const a=get();if(a&&ok)a.LMSSetValue(k,String(v));},
      save(){if(!IS_SCORM)return;const a=get();if(a&&ok)a.LMSCommit('');},
      finish(){if(!IS_SCORM)return;const a=get();if(a&&ok)a.LMSFinish('');},
    };
  })();

  /* ---- scoring global ---- */
  function quizBlocks(){const out=[];lessons.forEach(({l})=>l.blocks.forEach(b=>{if(['qcm','multi','match','blank'].includes(b.type))out.push(b);}));return out;}
  function totals(){let max=0,got=0,answered=0;quizBlocks().forEach(b=>{max+=(+b.points||0);const q=state.quiz[b.id];if(q){answered++;got+=(q.correct?(+b.points||0):0);}});return {max,got,answered,count:quizBlocks().length};}
  function reportScore(){const T=totals();if(T.max>0){const pct=Math.round(T.got/T.max*100);SCORM.set('cmi.core.score.raw',pct);SCORM.set('cmi.core.score.min',0);SCORM.set('cmi.core.score.max',100);}}
  function maybeComplete(){
    const allDone=lessons.every(({l})=>state.done[l.id]);
    if(allDone){
      const T=totals();const pct=T.max>0?Math.round(T.got/T.max*100):100;
      const pass=(C.settings.passScore||0);
      if(T.max>0) SCORM.set('cmi.core.lesson_status', pct>=pass?'passed':'failed');
      else SCORM.set('cmi.core.lesson_status','completed');
      SCORM.save();
    }
  }

  /* ---- progression : un bloc d'éval est-il "validé" ? ---- */
  function blockSatisfied(b){if(!['qcm','multi','match','blank'].includes(b.type))return true;const q=state.quiz[b.id];return q&&q.checked;}
  function lessonCompletable(l){
    if(l.progression==='completion'){return l.blocks.every(blockSatisfied);}
    return true;
  }

  load();

  /* ============ NAVIGATION ============ */
  const navMode=t.nav||'sidebar';
  function lessonState(i){
    const {l}=lessons[i];
    if(state.done[l.id])return'done';
    if(i===state.idx)return'active';
    // verrouillage séquentiel : leçon i accessible si toutes précédentes done
    const courseSeq=C.settings.progressionMode!=='free';
    if((courseSeq||lessons.slice(0,i).some(x=>x.l.progression!=='free'))){
      for(let k=0;k<i;k++){if(!state.done[lessons[k].l.id])return'locked';}
    }
    return'';
  }

  /* ============ RENDU D'UN BLOC ============ */

    const x=b&&b.box;if(!x||!x.pageBg||x.pageBg==='none')return null;
    if(x.pageBg==='color'&&x.pageColor)return {type:'color',color:x.pageColor};
    if(x.pageBg==='image'&&x.pageImage)return {type:'image',image:x.pageImage,size:(x.pageSize||'cover')};
    return null;
  }
  function renderBlock(b){
    const el=_renderBlock0(b);

      if(b.showInstr!==false&&b.instr&&String(b.instr).trim()){
        const m=String(b.instr).trim().match(/^(\S+)\s+([\s\S]+)$/);
        const ico=m?m[1]:'',tx=m?m[2]:String(b.instr).trim();
        const ins=document.createElement('p');ins.className='b-instr';
        ins.innerHTML=(ico?'<span class="bi-ic" aria-hidden="true">'+ico+'</span>':'')+'<span class="bi-tx">'+E(tx)+'</span>';
        const fc=el.firstElementChild;
        const host=(fc&&/(^|[\s-])[a-z-]*card($|[\s-])/.test(fc.className||''))?fc:el;
        host.insertBefore(ins,host.firstChild);
      }
    }catch(e){}
    return el;
  }

      case 'scenario':{d.innerHTML='<div class="scen"><div class="scen-q">'+RT(b.intro)+'</div>'+b.nodes.map((n,i)=>'<button class="scen-choice" data-i="'+i+'">'+E(n.choice)+'</button>').join('')+'<div class="scen-fb"></div></div>';const fb=d.querySelector('.scen-fb');d.querySelectorAll('.scen-choice').forEach(ch=>ch.onclick=()=>{d.querySelectorAll('.scen-choice').forEach(x=>x.classList.remove('picked'));ch.classList.add('picked');fb.innerHTML=RT(b.nodes[+ch.dataset.i].feedback);fb.classList.add('show');});break;}

        d.innerHTML='<div class="zo-wrap" style="'+rad+'height:'+(b.height||380)+'px">'+
          '<img class="zo-img" src="'+b.img+'" alt="'+E(b.alt||'')+'" style="transform-origin:'+(b.x==null?50:b.x)+'% '+(b.y==null?50:b.y)+'%;transform:scale('+z0+')">'+
          '</div>'+
          '<div class="zo-bar"><span class="zo-hint">'+E(b.hint||'Dézoomez pour découvrir')+'</span>'+
          '<div class="zo-ctl"><span class="zo-ic">'+svgIco('<circle cx="11" cy="11" r="7"/><path d="M8 11h6M20 20l-4.5-4.5"/>',15)+'</span>'+
          '<input class="zo-range" type="range" min="1" max="'+z0+'" step="0.05" value="'+z0+'" aria-label="Niveau de zoom">'+

          (b.caption&&b.caption.trim()?'<div class="zo-cap">'+fmt(b.caption)+'</div>':'');
        const im=d.querySelector('.zo-img'),rg=d.querySelector('.zo-range'),pc=d.querySelector('.zo-pc'),cap=d.querySelector('.zo-cap');
        const upd=()=>{

        d.innerHTML='<div class="hot-wrap zi-wrap">'+
          '<div class="zi-stage"><img class="zi-img" src="'+b.img+'" alt="'+E(b.alt||'')+'" style="'+rad+'"></div>'+
          b.spots.map((sp,i)=>'<button class="hot-pin" style="left:'+sp.x+'%;top:'+sp.y+'%'+((b.pinColor&&b.pinColor!=='auto')?';background:'+b.pinColor:'')+'" data-i="'+i+'">'+(i+1)+'</button>').join('')+
          '<div class="zi-panel"><button class="zi-close" aria-label="Fermer">✕</button><b class="zi-t"></b><div class="zi-b"></div></div>'+
          '<button class="zi-reset">'+svgIco('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',14)+' Vue d\'ensemble</button></div>';
        const wrap=d.querySelector('.zi-wrap'),img=d.querySelector('.zi-img'),pan=d.querySelector('.zi-panel');
        const pins=[...d.querySelectorAll('.hot-pin')];

          pan.classList.remove('show');wrap.classList.remove('zi-on');pins.forEach(x=>x.classList.remove('opened'));};
        pins.forEach(pn=>pn.onclick=()=>{

      case 'wheel':{
        const its=(b.items||[]).slice(0,12);
        if(its.length<2){d.innerHTML='<div class="card" style="padding:30px;text-align:center;color:var(--c-soft)">Ajoutez au moins deux segments à la roue.</div>';break;}
        const n=its.length,seg=360/n,R=96,CX=100,CY=100;
        const th=C.theme;
        const pal=[th.primary,th.accent].concat((th.brand||[]).filter(Boolean));
        const mix=(hex,amt)=>{
          const m=/^#?([0-9a-f]{6})$/i.exec(String(hex||'').trim());

      case 'scratch':{

  function renderDivider(b){
    const wrap=document.createElement('div');wrap.className='divider-block';
    const autoTop=(!b.colorTop||b.colorTop==='auto');
    const autoBot=(!b.colorBottom||b.colorBottom==='auto');
    const top=autoTop?(b.__bgTop||'var(--c-bg)'):b.colorTop;
    const bot=autoBot?(b.__bgBot||'var(--c-bg)'):b.colorBottom;
    if(b.shape==='line'||b.shape==='dashed'){
      const lc=autoTop?'var(--c-line)':b.colorTop;
      wrap.innerHTML='<div style="background:'+top+';padding:22px 0"><div class="div-line" style="border-top:'+(b.thickness||2)+'px '+(b.shape==='dashed'?'dashed':'solid')+' '+lc+';margin:0"></div></div>';
      return wrap;
    }
    const W=1200,H=Math.max(20,+b.height||60);
    let amp=Math.max(2,Math.min(+b.amplitude||24,H/2-2));
    if(b.flip)amp=-amp;   // on reflète la forme, les couleurs restent à leur place
    const freq=Math.max(1,+b.frequency||3);
    const seg=W/freq,mid=H/2;
    let d='';
    if(b.shape==='wave'||b.shape==='waves'||b.shape==='curve'){
      d='M0,'+mid;
      for(let i=0;i<freq;i++){const x=i*seg;
        d+=' C'+(x+seg*0.25).toFixed(1)+','+(mid-amp).toFixed(1)+' '+(x+seg*0.75).toFixed(1)+','+(mid+amp).toFixed(1)+' '+(x+seg).toFixed(1)+','+mid.toFixed(1);}
    } else if(b.shape==='triangle'){
      d='M0,'+(mid+amp).toFixed(1);
      for(let i=0;i<freq;i++){const x=i*seg;
        d+=' L'+(x+seg/2).toFixed(1)+','+(mid-amp).toFixed(1)+' L'+(x+seg).toFixed(1)+','+(mid+amp).toFixed(1);}
    } else if(b.shape==='zigzag'){
      d='M0,'+mid.toFixed(1);
      for(let i=0;i<freq;i++){const x=i*seg;
        d+=' L'+(x+seg/2).toFixed(1)+','+(mid-amp).toFixed(1)+' L'+(x+seg).toFixed(1)+','+mid.toFixed(1);}
    } else if(b.shape==='bracket'){
      d='M0,'+(mid+amp).toFixed(1);
      for(let i=0;i<freq;i++){const x=i*seg;
        d+=' L'+(x+seg*0.12).toFixed(1)+','+(mid+amp).toFixed(1)
          +' L'+(x+seg*0.12).toFixed(1)+','+(mid-amp).toFixed(1)
          +' L'+(x+seg*0.88).toFixed(1)+','+(mid-amp).toFixed(1)
          +' L'+(x+seg*0.88).toFixed(1)+','+(mid+amp).toFixed(1);}
      d+=' L'+W+','+(mid+amp).toFixed(1);
    } else if(b.shape==='arc'){
      d='M0,'+(mid+amp).toFixed(1)+' Q'+(W/2)+','+(mid-amp*2).toFixed(1)+' '+W+','+(mid+amp).toFixed(1);
    } else if(b.shape==='tilt'){
      d='M0,'+(mid+amp).toFixed(1)+' L'+W+','+(mid-amp).toFixed(1);
    } else if(b.shape==='arrow'){
      d='M0,'+(mid-amp).toFixed(1)+' L'+(W/2)+','+(mid+amp).toFixed(1)+' L'+W+','+(mid-amp).toFixed(1);
    } else if(b.shape==='round'){
      d='M0,'+(mid+amp).toFixed(1)+' Q0,'+(mid-amp).toFixed(1)+' '+(W*0.08)+','+(mid-amp).toFixed(1)+' L'+(W*0.92)+','+(mid-amp).toFixed(1)+' Q'+W+','+(mid-amp).toFixed(1)+' '+W+','+(mid+amp).toFixed(1);
    } else if(b.shape==='cloud'){
      d='M0,'+(mid+amp).toFixed(1);
      for(let i=0;i<freq;i++){const x=i*seg;
        d+=' Q'+(x+seg*0.25).toFixed(1)+','+(mid-amp*1.5).toFixed(1)+' '+(x+seg*0.5).toFixed(1)+','+mid.toFixed(1)
          +' Q'+(x+seg*0.75).toFixed(1)+','+(mid+amp*1.5).toFixed(1)+' '+(x+seg).toFixed(1)+','+(mid+amp).toFixed(1);}
    } else if(b.shape==='steps'){
      d='M0,'+(mid+amp).toFixed(1);
      for(let i=0;i<freq;i++){const x=i*seg;const y=(mid+amp)-((i+1)/freq)*(amp*2);
        d+=' L'+(x+seg).toFixed(1)+','+(mid+amp).toFixed(1).replace(/.*/,String(((mid+amp)-((i)/freq)*(amp*2)).toFixed(1)))+' L'+(x+seg).toFixed(1)+','+y.toFixed(1);}
      d+=' L'+W+','+(mid-amp).toFixed(1);
    } else if(b.shape==='torn'){
      d='M0,'+mid.toFixed(1);

      for(let i=0;i<n;i++){const x=(i+1)*st;const y=mid+((i%2===0)?-1:1)*(amp*(0.4+((i*37)%10)/12));
        d+=' L'+x.toFixed(1)+','+y.toFixed(1);}
    } else { d='M0,'+mid+' L'+W+','+mid; }
    // Photo voisine : on ne redessine JAMAIS la photo (sinon elle recommence).
    // On chevauche l'espaceur avec une marge négative et on laisse la vraie photo transparaître.
    const useImg=(b.useNeighborImg!==false);
    const imgTop=(useImg&&autoTop)?b.__imgTop:null;
    const imgBot=(useImg&&autoBot)?b.__imgBot:null;
    const flip='';
    let path,fill,svgBg;
    if(imgBot){
      // photo EN DESSOUS : on peint le dessus, le dessous est transparent, on remonte la photo sous le séparateur
      path=d+' L'+W+',0 L0,0 Z';fill=top;svgBg='background:transparent;';
      wrap.dataset.ov='bottom';wrap.dataset.ovh=H;

      path=d+' L'+W+','+H+' L0,'+H+' Z';fill=bot;svgBg='background:transparent;';
      wrap.dataset.ov='top';wrap.dataset.ovh=H;
    } else {
      path=d+' L'+W+',0 L0,0 Z';fill=top;svgBg='background:'+bot+';';
    }
    const sx=Math.max(-50,Math.min(50,+b.shiftX||0));
    const k=Math.abs(sx), svgW=(100+2*k), svgL=(-k+sx);
    wrap.innerHTML='<div class="dv-vp" style="overflow:hidden;'+svgBg+'"><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="display:block;width:'+svgW+'%;margin-left:'+svgL+'%;height:'+H+'px"><path d="'+path+'" fill="'+fill+'"'+flip+'></path></svg></div>';
    return wrap;
  }

  /* ============ GRAPHIQUES (SVG maison) ============ */
  const CHART_PAL=['#2c2a4a','#c0653a','#3f7d5b','#4a6fa5','#a5594a','#b08d57','#6a7d8c','#8c5a8c'];
  function chartColor(i){return CHART_PAL[i%CHART_PAL.length];}
  function renderChart(b){
    const wrap=document.createElement('div');wrap.className='chart-card'+(b.frame===false?' no-frame':'');

    let html=b.title?'<div class="chart-title">'+E(b.title)+'</div>':'';
    const labels=b.labels||[];
    if(b.kind==='table'){
      html+='<table class="data-tbl"><thead><tr><th></th>'+b.series.map(s=>'<th>'+E(s.name)+'</th>').join('')+'</tr></thead><tbody>';
      labels.forEach((lb,r)=>{html+='<tr><th>'+E(lb)+'</th>'+b.series.map(s=>'<td>'+E(s.data[r]!=null?s.data[r]:'')+'</td>').join('')+'</tr>';});
      html+='</tbody></table>';wrap.innerHTML=html;return wrap;
    }
    if(b.kind==='pie'||b.kind==='doughnut'){
      const data=(b.series[0]&&b.series[0].data)||[];const tot=data.reduce((a,v)=>a+(+v||0),0)||1;
      let ang=-Math.PI/2,paths='';const cx=110,cy=110,rad=100;
      data.forEach((v,i)=>{const frac=(+v||0)/tot;const a2=ang+frac*Math.PI*2;
        const x1=cx+rad*Math.cos(ang),y1=cy+rad*Math.sin(ang),x2=cx+rad*Math.cos(a2),y2=cy+rad*Math.sin(a2);
        const large=frac>0.5?1:0;
        paths+='<path d="M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+rad+','+rad+' 0 '+large+',1 '+x2.toFixed(2)+','+y2.toFixed(2)+' Z" fill="'+col(i)+'" stroke="var(--c-panel)" stroke-width="2"></path>';
        ang=a2;});
      const hole=b.kind==='doughnut'?'<circle cx="'+cx+'" cy="'+cy+'" r="52" fill="var(--c-panel)"></circle>':'';
      html+='<svg viewBox="0 0 220 220" style="max-width:260px;display:block;margin:0 auto">'+paths+hole+'</svg>';
      html+='<div class="chart-legend">'+labels.map((lb,i)=>'<span><i style="background:'+col(i)+'"></i>'+E(lb)+' ('+Math.round((+data[i]||0)/tot*100)+'%)</span>').join('')+'</div>';
      wrap.innerHTML=html;return wrap;
    }
    if(b.kind==='radar'){
      const cx=150,cy=140,rad=100;const n=labels.length||3;
      let max=0;b.series.forEach(s=>s.data.forEach(v=>{if(+v>max)max=+v;}));max=max||1;const niceMax=Math.ceil(max/4)*4||4;
      const pt=(i,r)=>{const a=-Math.PI/2+i/n*Math.PI*2;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
      let g='';
      for(let k=1;k<=4;k++){const rr=rad*k/4;let poly=[];for(let i=0;i<n;i++){const[x,y]=pt(i,rr);poly.push(x.toFixed(1)+','+y.toFixed(1));}g+='<polygon points="'+poly.join(' ')+'" fill="none" stroke="var(--c-line)" stroke-width="1"></polygon>';}
      for(let i=0;i<n;i++){const[x,y]=pt(i,rad);g+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="var(--c-line)"></line>';const[lx,ly]=pt(i,rad+16);g+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" font-size="10" fill="var(--c-soft)" text-anchor="middle">'+E(labels[i])+'</text>';}
      b.series.forEach((s,si)=>{let poly=[];for(let i=0;i<n;i++){const[x,y]=pt(i,rad*(+s.data[i]||0)/niceMax);poly.push(x.toFixed(1)+','+y.toFixed(1));}g+='<polygon points="'+poly.join(' ')+'" fill="'+col(si)+'" fill-opacity=".18" stroke="'+col(si)+'" stroke-width="2"></polygon>';});
      html+='<svg viewBox="0 0 300 290" style="width:100%;max-width:340px;display:block;margin:0 auto">'+g+'</svg>';
      if(b.series.length>1)html+='<div class="chart-legend">'+b.series.map((s,i)=>'<span><i style="background:'+col(i)+'"></i>'+E(s.name||('Série '+(i+1)))+'</span>').join('')+'</div>';
      wrap.innerHTML=html;return wrap;
    }
    if(b.kind==='hbar'){
      const W=560,rowH=34,pad=8,labW=90;const H=Math.max(120,labels.length*(rowH*Math.max(1,b.series.length)/1+pad)+30);
      let max=0;b.series.forEach(s=>s.data.forEach(v=>{if(+v>max)max=+v;}));max=max||1;const niceMax=Math.ceil(max/4)*4||4;
      const gw=W-labW-20;let g='';
      for(let k=0;k<=4;k++){const xx=labW+gw*k/4;g+='<line x1="'+xx+'" y1="10" x2="'+xx+'" y2="'+(H-20)+'" stroke="var(--c-line)"></line><text x="'+xx+'" y="'+(H-6)+'" font-size="10" fill="var(--c-soft)" text-anchor="middle">'+Math.round(niceMax*k/4)+'</text>';}
      const n=b.series.length;const bh=Math.min(22,(rowH-6)/n);
      labels.forEach((lb,i)=>{const y0=14+i*rowH;
        g+='<text x="'+(labW-8)+'" y="'+(y0+rowH/2)+'" font-size="11" fill="var(--c-soft)" text-anchor="end">'+E(lb)+'</text>';
        b.series.forEach((s,si)=>{const w=gw*(+s.data[i]||0)/niceMax;g+='<rect x="'+labW+'" y="'+(y0+si*bh).toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(bh-2).toFixed(1)+'" rx="3" fill="'+col(si)+'"></rect>';});});
      html+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%">'+g+'</svg>';

      wrap.innerHTML=html;return wrap;
    }
    // bar / stacked / line / area

    let max=0;
    if(b.kind==='stacked'){labels.forEach((_,i)=>{let s=0;b.series.forEach(se=>s+=(+se.data[i]||0));if(s>max)max=s;});}
    else b.series.forEach(s=>s.data.forEach(v=>{if(+v>max)max=+v;}));
    max=max||1;const niceMax=Math.ceil(max/4)*4||4;
    const xAt=i=>pl+(labels.length<=1?gw/2:gw*i/(labels.length-1));
    const yAt=v=>pt+gh-(gh*(+v||0)/niceMax);
    let g='';
    for(let k=0;k<=4;k++){const yy=pt+gh*k/4;const val=Math.round(niceMax*(4-k)/4);
      g+='<line x1="'+pl+'" y1="'+yy+'" x2="'+(W-pr)+'" y2="'+yy+'" stroke="var(--c-line)" stroke-width="1"></line>';

    if(b.kind==='bar'){
      const groups=labels.length||1;const bandw=gw/groups;const n=b.series.length;const bw=Math.min(46,bandw/(n+0.6));
      labels.forEach((lb,i)=>{const x0=pl+bandw*i+(bandw-bw*n)/2;
        b.series.forEach((s,si)=>{const v=s.data[i];const y=yAt(v);const x=x0+bw*si;
          g+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw-3).toFixed(1)+'" height="'+(pt+gh-y).toFixed(1)+'" rx="3" fill="'+col(si)+'"></rect>';});
        g+='<text x="'+(pl+bandw*i+bandw/2).toFixed(1)+'" y="'+(H-pb+18)+'" font-size="11" fill="var(--c-soft)" text-anchor="middle">'+E(lb)+'</text>';});
    } else if(b.kind==='stacked'){
      const groups=labels.length||1;const bandw=gw/groups;const bw=Math.min(54,bandw*0.6);

        b.series.forEach((s,si)=>{const v=+s.data[i]||0;const y=yAt(acc+v);const h=gh*v/niceMax;
          g+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+h.toFixed(1)+'" fill="'+col(si)+'"></rect>';acc+=v;});
        g+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-pb+18)+'" font-size="11" fill="var(--c-soft)" text-anchor="middle">'+E(lb)+'</text>';});
    } else { // line / area
      b.series.forEach((s,si)=>{let pts=labels.map((_,i)=>xAt(i).toFixed(1)+','+yAt(s.data[i]).toFixed(1)).join(' ');
        if(b.kind==='area'){g+='<polygon points="'+pl+','+(pt+gh)+' '+pts+' '+(W-pr)+','+(pt+gh)+'" fill="'+col(si)+'" fill-opacity=".15"></polygon>';}

        else op.classList.toggle('sel');});
    }

      if(b.type==='qcm'||b.type==='multi'){
        const sel=[...wrap.querySelectorAll('.opt.sel')].map(o=>o.dataset.oid);
        if(!sel.length)return;
        const good=b.options.filter(o=>o.correct).map(o=>o.id);
        correct=sel.length===good.length&&sel.every(id=>good.includes(id));
        rec.sel=sel;
      } else if(b.type==='match'){
        const ans={};let all=true;
        wrap.querySelectorAll('select').forEach(s=>{ans[s.dataset.pid]=s.value;if(!s.value)all=false;});
        if(!all)return;
        correct=b.pairs.every(p=>ans[p.id]===p.right);rec.ans=ans;
      } else if(b.type==='blank'){
        const ans={};let all=true;correct=true;
        wrap.querySelectorAll('input').forEach(inp=>{const i=+inp.dataset.bi;ans[i]=inp.value;if(!inp.value.trim())all=false;if(!blankOk(inp.value,inp.dataset.ans))correct=false;});
        if(!all)return;rec.ans=ans;
      }
      rec.correct=correct;state.quiz[b.id]=rec;persist();
      const fresh=renderQuiz(b);wrap.replaceWith(fresh);

    });

  const BC_LBL={progress:'Atteindre {v} % de progression',lessons_all:'Terminer toutes les leçons',lesson_done:'Terminer une leçon précise',module_done:'Terminer un module précis',score:'Obtenir {v} % au score global',quiz_all:'Répondre à toutes les questions',quiz_correct:'Réussir {v} questions',quiz_perfect:'Répondre juste à toutes les questions',reflect_count:'Rédiger {v} réflexions',reflect_all:'Rédiger toutes les réflexions',postit_count:'Créer {v} post-its',highlight_count:'Surligner {v} passages',notes_dl:'Télécharger ses notes',time:'Passer {v} minutes dans le cours',spots:'Explorer {v} points',scratch:'Gratter {v} carte(s)',flip:'Retourner {v} flashcards',slider:'Utiliser {v} curseur(s) de comparaison'};
  function badgeText(bd){return (BC_LBL[bd.cond]||'').replace('{v}',bd.value==null?'':bd.value);}
  function stats(){state.stats=state.stats||{time:0,dl:0,spots:{},scratch:{},flip:{},slider:{}};

  function allB(){const r=[];lessons.forEach(o=>o.l.blocks.forEach(b=>r.push(b)));return r;}
  function quizB(){return allB().filter(b=>b.points!=null);}
  function scorePct(){
    const qs=quizB();if(!qs.length)return 0;
    let tot=0,got=0;
    qs.forEach(q=>{const pt=+q.points||0;tot+=pt;const r=state.quiz[q.id];if(r&&r.correct)got+=pt;});
    return tot?Math.round((got/tot)*100):0;

  function badgeOk(bd){
    const st=state,v=+bd.value||0,sx=stats();
    const totL=lessons.length,doneL=lessons.filter(o=>st.done[o.l.id]).length;
    const cnt=o=>Object.keys(o||{}).length;
    switch(bd.cond){
      case 'progress': return totL>0&&(doneL/totL)*100>=v;
      case 'lessons_all': return totL>0&&doneL===totL;
      case 'lesson_done': return !!st.done[bd.target];
      case 'module_done': {const ls=lessons.filter(o=>o.m.id===bd.target);return ls.length>0&&ls.every(o=>st.done[o.l.id]);}
      case 'score': return scorePct()>=v;
      case 'quiz_all': {const qs=quizB();return qs.length>0&&qs.every(q=>st.quiz[q.id]);}
      case 'quiz_correct': return Object.keys(st.quiz).filter(k=>st.quiz[k]&&st.quiz[k].correct).length>=v;
      case 'quiz_perfect': {const qs=quizB();return qs.length>0&&qs.every(q=>st.quiz[q.id]&&st.quiz[q.id].correct);}
      case 'reflect_count': return Object.keys(st.notes||{}).filter(k=>(st.notes[k]||'').trim()).length>=v;
      case 'reflect_all': {const rs=allB().filter(b=>b.type==='reflect');return rs.length>0&&rs.every(b=>(st.notes[b.id]||'').trim());}
      case 'postit_count': {let n=0;Object.keys(st.postits||{}).forEach(k=>{n+=(st.postits[k]||[]).filter(x=>x.t&&x.t.trim()).length;});return n>=v;}
      case 'highlight_count': {let n=0;Object.keys(st.hl||{}).forEach(k=>{n+=(st.hl[k]||[]).length;});return n>=v;}
      case 'notes_dl': return (sx.dl||0)>=1;
      case 'time': return (sx.time||0)>=v;
      case 'spots': return cnt(sx.spots)>=v;

    }
    return false;

  function onHlSelect(){
    if(!hlActive||hlActive==='erase')return;
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed)return;
    const r=sel.getRangeAt(0);const txt=String(sel).trim();
    if(txt.length<2)return;
    const host=(r.commonAncestorContainer.nodeType===1?r.commonAncestorContainer:r.commonAncestorContainer.parentElement).closest('.b');
    if(!host||!contentEl.contains(host))return;
    if(host.querySelector('input,textarea'))return;
    try{
      const mk=document.createElement('mark');mk.className='hl';mk.dataset.c=hlActive;mk.style.background=hlActive;
      r.surroundContents(mk);
      bindEraser(mk);
      const lid=lessons[state.idx]?lessons[state.idx].l.id:'x';
      state.hl[lid]=state.hl[lid]||[];
      state.hl[lid].push({bid:host.dataset.bid||'',t:txt,c:hlActive});
      persist();
    }catch(e){}
    sel.removeAllRanges();

  function bindEraser(mk){
    mk.onclick=()=>{
      if(hlActive!=='erase')return;

      const t=mk.textContent.trim();
      state.hl[lid]=(state.hl[lid]||[]).filter(h=>h.t!==t);
      const par=mk.parentNode;while(mk.firstChild)par.insertBefore(mk.firstChild,mk);
      par.removeChild(mk);par.normalize();persist();
    };
  }
  function restoreHighlights(l){
    const arr=(state.hl||{})[l.id];if(!arr||!arr.length)return;

      const host=h.bid?contentEl.querySelector('.b[data-bid="'+h.bid+'"]'):contentEl;
      if(!host)return;
      const w=document.createTreeWalker(host,NodeFilter.SHOW_TEXT,null);
      let node;
      while((node=w.nextNode())){
        if(node.parentElement&&node.parentElement.closest('mark.hl'))continue;
        const i=node.nodeValue.indexOf(h.t);
        if(i<0)continue;
        try{
          const r=document.createRange();r.setStart(node,i);r.setEnd(node,i+h.t.length);
          const mk=document.createElement('mark');mk.className='hl';mk.dataset.c=h.c;mk.style.background=h.c;
          r.surroundContents(mk);bindEraser(mk);

        break;
      }
    });

        // déplacement (souris et doigt)
        const grab=n.querySelector('.pit-grab');
        grab.addEventListener('pointerdown',ev=>{
          ev.preventDefault();
          const list=state.postits[b.id];let from=+n.dataset.i;
          n.classList.add('pit-drag');
          try{grab.setPointerCapture(ev.pointerId);}catch(e){}
          const move=e2=>{
            const el=document.elementFromPoint(e2.clientX,e2.clientY);
            const tgt=el&&el.closest?el.closest('.pit'):null;
            if(!tgt||tgt===n||!board.contains(tgt))return;
            const to=+tgt.dataset.i;
            if(to===from||isNaN(to))return;
            const [it2]=list.splice(from,1);list.splice(to,0,it2);
            from=to;save();draw();
            const again=board.querySelector('.pit[data-i="'+to+'"]');
            if(again){again.classList.add('pit-drag');
              const g2=again.querySelector('.pit-grab');
              try{g2.setPointerCapture(e2.pointerId);}catch(e){}
              g2.addEventListener('pointermove',move);g2.addEventListener('pointerup',up);g2.addEventListener('pointercancel',up);
              grab.removeEventListener('pointermove',move);grab.removeEventListener('pointerup',up);
            }
          };
          const up=()=>{
            board.querySelectorAll('.pit').forEach(x=>x.classList.remove('pit-drag'));
            grab.removeEventListener('pointermove',move);grab.removeEventListener('pointerup',up);grab.removeEventListener('pointercancel',up);
          };
          grab.addEventListener('pointermove',move);grab.addEventListener('pointerup',up);grab.addEventListener('pointercancel',up);
        });
        board.appendChild(n);
      });
      if(!arr.length)board.innerHTML='<div class="pit-empty">Aucune idée pour le moment.</div>';
    }
    d.querySelector('.pit-add').onclick=()=>{
      state.postits[b.id]=state.postits[b.id]||[];
      state.postits[b.id].push({t:'',c:palette[state.postits[b.id].length%palette.length]});
      save();draw();
      setTimeout(()=>{const tas=board.querySelectorAll('textarea');if(tas.length)tas[tas.length-1].focus();},30);
    };
    draw();
    return d;
  }

  // ---- Fond global du cours : sections pleine largeur dans le flux ----
  function bandCss(pbg){
    if(!pbg)return '';
    if(pbg.type==='color')return 'background-color:'+pbg.color+';';
    if(pbg.type==='image')return 'background-image:url('+pbg.image+');background-size:'+(pbg.size==='repeat'?'auto':pbg.size)+';background-position:center;background-repeat:'+(pbg.size==='repeat'?'repeat':'no-repeat')+';';
    return '';
  }
  // couleur de fond en vigueur à chaque bloc (null = fond du thème)
  function effBgSeq(blocks){
    let cur=null;const seq=[];
    blocks.forEach(b=>{const p=blockPageBg(b);
      if(b.type==='spacer'){seq.push((p&&p.type==='color')?p.color:cur);return;}
      if(p)cur=(p.type==='color'?p.color:null);seq.push(cur);});
    return seq;
  }
  // découpe les blocs en sections ; les séparateurs sont collés ENTRE les sections
  function sectionize(host,blocks,headEl,makeItem){
    const seq=effBgSeq(blocks);
    let sec=null,secIn=null,curPbg=null,lastSec=null,noPt=false;
    function openSec(pbg){
      sec=document.createElement('div');
      sec.className='sec'+(pbg?' has-bg':'')+(noPt?' no-pt':'');
      noPt=false;
      if(pbg)sec.setAttribute('style',bandCss(pbg));
      host.appendChild(sec);lastSec=sec;
      secIn=document.createElement('div');secIn.className='sec-in';sec.appendChild(secIn);
    }
    function ensure(){if(!sec)openSec(curPbg);}
    openSec(null);
    if(headEl)secIn.appendChild(headEl);
    blocks.forEach((b,i)=>{
      const p=blockPageBg(b);
      if(p&&b.type!=='spacer'){curPbg=p;sec=null;}
      const spCol=x=>{
        if(!x||x.type!=='spacer')return null;
        if(x.fill==='color'&&x.color)return x.color;
        if(x.box&&x.box.pageBg==='color'&&x.box.pageColor)return x.box.pageColor;
        return null;
      };
      b.__bgTop=spCol(blocks[i-1])||seq[i];
      b.__bgBot=spCol(blocks[i+1])||((i+1<blocks.length)?seq[i+1]:seq[i]);
      // photo d'un espaceur voisin, pour prolonger l'image dans le séparateur
      const spImg=x=>{
        if(!x)return null;
        if(x.type==='spacer'&&x.fill==='image'&&x.img)return x.img;
        if(x.box&&x.box.pageBg==='image'&&x.box.pageImage)return x.box.pageImage;
        return null;
      };
      b.__imgTop=spImg(blocks[i-1]);
      b.__imgBot=spImg(blocks[i+1]);
      const item=makeItem(b,i);
      if(b.type==='divider'){
        // collé entre les sections : on supprime les rembourrages de jonction
        if(lastSec)lastSec.classList.add('no-pb');
        sec=null;noPt=true;
        host.appendChild(item);return;
      }
      if(b.type==='spacer'){
        if(p){
          // fond propre à l'espaceur : section dédiée sans rembourrage, puis retour au fond précédent
          openSec(p);sec.classList.add('sec-flush');sec.appendChild(item);
          if(lastSec)lastSec.classList.add('no-pb');
          sec=null;noPt=true;
        } else {
          ensure();sec.appendChild(item);
          secIn=document.createElement('div');secIn.className='sec-in';sec.appendChild(secIn);
        }
        return;
      }
      ensure();
      secIn.appendChild(item);
    });
  }
  function syncSections(){
    contentEl.querySelectorAll('.sec').forEach(sec=>{
      const bs=[...sec.querySelectorAll('.b')];
      if(!bs.length)return;
      sec.classList.toggle('sec-hidden',!bs.some(x=>!x.classList.contains('gated')));
    });
  }
  function wireGates(){
    syncSections();
    contentEl.querySelectorAll('.cont-btn').forEach(btn=>{
      btn.onclick=()=>{
        const host=btn.closest('.b');const g=+(host.dataset.gate||0);
        contentEl.querySelectorAll('.b[data-gate]').forEach(el=>{if(+el.dataset.gate===g+1)el.classList.remove('gated');});
        host.classList.add('cont-used');
        syncSections();
        setTimeout(()=>{const nx=[...contentEl.querySelectorAll('.b[data-gate]')].find(el=>+el.dataset.gate===g+1);
          if(nx&&nx.scrollIntoView)nx.scrollIntoView({behavior:'smooth',block:'start'});},60);
      };
    });
  }
  function wireReveal(){
    const rv=C.settings.reveal||'none';
    if(rv==='none'||!('IntersectionObserver' in window))return;
    const els=[...contentEl.querySelectorAll('.b')];
    const sp=((C.settings.revealSpeed||550)/1000)+'s';
    els.forEach(e=>{e.classList.add('rv','rv-'+rv);e.style.setProperty('--rvs',sp);});
    const io=new IntersectionObserver(ents=>{ents.forEach(en=>{if(en.isIntersecting){en.target.classList.add('rv-in');io.unobserve(en.target);}});},{rootMargin:'0px 0px -6% 0px',threshold:0.05});
    els.forEach(e=>io.observe(e));
  }

  // ---- Collecte des notes de l'apprenant ----
  function collectNotes(only){
    const excl=C.settings.notesExclude||[];
    const out={refl:[],pits:[],hl:[],any:false};
    lessons.forEach(function(o){
      o.l.blocks.forEach(function(b){
        if(b.type==='reflect'&&excl.indexOf(b.id)<0&&(!only||only.indexOf(b.id)>=0)){
          const v=state.notes[b.id]||'';
          out.refl.push({q:b.prompt||'Réflexion',v:v,les:o.l.title});
          if(v.trim())out.any=true;
        }
        if(b.type==='postit'&&(!only||only.indexOf(b.id)>=0)){
          const arr=((state.postits||{})[b.id]||[]).filter(function(x){return x.t&&x.t.trim();});
          if(arr.length){out.pits.push({q:b.prompt||'Post-its',items:arr,les:o.l.title});out.any=true;}
        }
      });
    });
    if(!only||only.indexOf('__hl')>=0){
      lessons.forEach(function(o){
        const arr=(state.hl||{})[o.l.id]||[];
        if(arr.length){out.hl.push({les:o.l.title,items:arr});out.any=true;}
      });
    }
    return out;
  }
  function notesFileName(){return (C.meta.title||'notes').replace(/\W+/g,'_')+'_notes';}
  // ---- Version texte ----
  function notesTxt(only,label){
    const d=collectNotes(only);
    let t=(C.meta.title||'Cours')+'\n'+'='.repeat((C.meta.title||'Cours').length)+'\n\n'+(label||'Mes notes')+'\n\n';
    d.refl.forEach(function(r){t+='● '+r.q+'\n'+(r.v&&r.v.trim()?r.v:'(pas de note)')+'\n\n';});
    d.pits.forEach(function(pp){t+='● '+pp.q+'\n';pp.items.forEach(function(x){t+='  – '+x.t.trim()+'\n';});t+='\n';});
    if(d.hl.length){t+='Passages surlignés\n\n';d.hl.forEach(function(h){t+='● '+h.les+'\n';h.items.forEach(function(x){t+='  ▸ '+x.t+'\n';});t+='\n';});}
    t+='\n— Généré le '+new Date().toLocaleDateString('fr-FR');
    return t;
  }
  function downloadNotesTxt(only,label){
    const sx=stats();sx.dl=(sx.dl||0)+1;persist();checkBadges();
    const blob=new Blob([notesTxt(only,label)],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=notesFileName()+'.txt';a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  }

      '</header>';
    if(!d.any)h+='<p class="np-empty">Aucune note pour le moment.</p>';
    if(d.refl.length){
      h+='<section class="np-sec"><h2>Réflexions</h2>';
      d.refl.forEach(function(r){
        h+='<article class="np-item"><div class="np-q">'+E(r.q)+'</div>'+
          '<div class="np-a'+(r.v&&r.v.trim()?'':' np-none')+'">'+(r.v&&r.v.trim()?E(r.v).replace(/\n/g,'<br>'):'Pas de note')+'</div>'+
          '<div class="np-src">'+E(r.les)+'</div></article>';
      });
      h+='</section>';
