<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cohérence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#F1F8F5; --green:#155C48; --terra:#B85C2E; --dark:#14211D;
  --gap:clamp(12px,2.6vh,20px);
}
html[data-theme="light"]{
  --bg:#F1F8F5; --ink:#14211D; --muted:rgba(20,33,29,.56); --faint:rgba(20,33,29,.34);
  --line:rgba(21,92,72,.18); --surface:rgba(255,255,255,.7); --on:#155C48; --curve:#155C48; --accent:#B85C2E;
}
html[data-theme="dark"]{
  --bg:#14211D; --ink:#F1F8F5; --muted:rgba(241,248,245,.58); --faint:rgba(241,248,245,.34);
  --line:rgba(241,248,245,.15); --surface:rgba(241,248,245,.06); --on:#26A682; --curve:#26A682; --accent:#D2703B;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font:300 15px/1.4 'Poppins',system-ui,-apple-system,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.shell{
  min-height:100dvh;max-width:560px;margin:0 auto;
  padding:clamp(14px,2.4vh,20px) clamp(16px,4vw,24px) calc(clamp(14px,2.4vh,20px) + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;
}

/* topbar */
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:none}
.mark{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase}
.mark i{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.tools{display:flex;gap:6px}
.lang{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.lang button{padding:5px 10px;font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--faint);transition:.2s}
.lang button[aria-pressed="true"]{background:var(--on);color:var(--bg)}
.ico{width:29px;height:29px;border:1px solid var(--line);border-radius:99px;display:grid;place-items:center;transition:.2s}
.ico:hover{border-color:var(--accent)}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.6}

/* views */
.view{display:none;flex:1;flex-direction:column;min-height:0}
.view.on{display:flex;animation:in .4s ease both}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* labels */
.lbl{margin:0 0 7px;font-size:9.5px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px}
.lbl::after{content:"";flex:1;height:1px;background:var(--line)}
.row{margin-top:var(--gap)}

/* setup */
.title{margin:var(--gap) 0 0;font-size:clamp(24px,6.4vw,34px);font-weight:200;letter-spacing:-.03em;line-height:1.05}
.title em{font-style:normal;color:var(--accent)}
.sub{margin:6px 0 0;font-size:12.5px;line-height:1.45;color:var(--muted);max-width:42ch}

.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:7px 13px;border:1px solid var(--line);border-radius:99px;font-size:12.5px;transition:.2s;white-space:nowrap}
.pill:hover{border-color:var(--on)}
.pill[aria-pressed="true"]{background:var(--on);border-color:var(--on);color:var(--bg);font-weight:500}
.info{margin:8px 0 0;font-size:12px;color:var(--muted);line-height:1.4;min-height:1.4em}
.info b{color:var(--ink);font-weight:500;letter-spacing:.06em;margin-right:8px}

.duo{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
@media (max-width:430px){.duo{grid-template-columns:1fr}}

.opt{display:flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--line);border-radius:99px;font-size:12.5px;transition:.2s}
.opt:hover{border-color:var(--on)}
.opt i{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:.2s}
.opt[aria-pressed="true"]{border-color:var(--on)}
.opt[aria-pressed="true"] i{background:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}

.sliders{display:none;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;padding:12px;border:1px dashed var(--line);border-radius:14px}
.sliders.on{display:grid}
@media (max-width:430px){.sliders{grid-template-columns:1fr 1fr}}
.sl{display:flex;flex-direction:column;gap:5px}
.sl span{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);line-height:1.2;min-height:2.4em}
.sl output{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.sl input{width:100%;-webkit-appearance:none;appearance:none;height:2px;background:var(--line);border-radius:2px;margin:2px 0 0}
.sl input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent);cursor:pointer}
.sl input::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);cursor:pointer}

.cta{
  margin-top:auto;width:100%;padding:15px;border-radius:99px;background:var(--on);color:var(--bg);
  font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:9px;transition:.2s;
}
.cta:hover{filter:brightness(1.08)}
.cta:active{transform:scale(.99)}
.cta svg{width:14px;height:14px;fill:currentColor;stroke:none}
.hint{margin:8px 0 0;text-align:center;font-size:10.5px;color:var(--faint)}
.spacer{height:var(--gap)}

/* session */
#session{justify-content:center;gap:var(--gap)}
.phase{text-align:center}
.prep{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.word{font-size:clamp(18px,4.6vw,26px);font-weight:200;letter-spacing:-.01em;transition:opacity .35s}
.count{font-size:clamp(46px,14vw,74px);font-weight:200;line-height:1.05;letter-spacing:-.05em;color:var(--accent);font-variant-numeric:tabular-nums}
.wavewrap{width:100%;height:clamp(110px,24vh,180px)}
canvas{display:block;width:100%;height:100%}
.meta{display:flex;justify-content:space-between;font-size:11.5px;letter-spacing:.05em;color:var(--muted)}
.meta b{font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
.bar{height:2px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.bar span{display:block;height:100%;width:0;background:var(--accent);transition:width .3s linear}
.ctrls{display:flex;gap:8px;margin-top:12px}
.ctrl{flex:1;padding:12px;border:1px solid var(--line);border-radius:99px;font-size:12.5px;transition:.2s}
.ctrl:hover{border-color:var(--on)}
.ctrl.pri{background:var(--surface);border-color:var(--on);font-weight:500}

/* done */
#done{justify-content:center;text-align:center;gap:var(--gap)}
#done h2{margin:0;font-size:clamp(24px,6.4vw,34px);font-weight:200;letter-spacing:-.03em}
#done p{margin:5px 0 0;font-size:12.5px;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{padding:13px 6px;border:1px solid var(--line);border-radius:14px}
.stat b{display:block;font-size:22px;font-weight:200;font-variant-numeric:tabular-nums}
.stat span{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.today{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11.5px;color:var(--muted)}
.pips{display:flex;gap:5px}
.pips i{width:8px;height:8px;border-radius:50%;border:1px solid var(--faint)}
.pips i.full{background:var(--accent);border-color:var(--accent)}
#done .cta{margin-top:0}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="mark"><i></i>Cohérence</div>
    <div class="tools">
      <div class="lang">
        <button data-lang="fr" aria-pressed="true">FR</button>
        <button data-lang="en" aria-pressed="false">EN</button>
      </div>
      <button class="ico" id="theme" aria-label="Thème"><svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg></button>
    </div>
  </header>

  <!-- SETUP -->
  <section class="view on" id="setup">
    <h1 class="title"><span data-t="h1a"></span> <em data-t="h1b"></em></h1>
    <p class="sub" data-t="tagline"></p>

    <div class="row">
      <p class="lbl" data-t="lblProto"></p>
      <div class="pills" id="protos"></div>
      <p class="info" id="protoInfo"></p>
      <div class="sliders" id="sliders">
        <label class="sl"><span data-t="sIn"></span><output id="oIn"></output><input type="range" id="rIn" min="2" max="10" step="0.5" value="5"></label>
        <label class="sl"><span data-t="sHold1"></span><output id="oHold1"></output><input type="range" id="rHold1" min="0" max="10" step="0.5" value="0"></label>
        <label class="sl"><span data-t="sOut"></span><output id="oOut"></output><input type="range" id="rOut" min="2" max="12" step="0.5" value="5"></label>
        <label class="sl"><span data-t="sHold2"></span><output id="oHold2"></output><input type="range" id="rHold2" min="0" max="10" step="0.5" value="0"></label>
      </div>
    </div>

    <div class="row duo">
      <div>
        <p class="lbl" data-t="lblDur"></p>
        <div class="pills" id="durs"></div>
      </div>
      <div>
        <p class="lbl" data-t="lblGuide"></p>
        <div class="pills">
          <button class="opt" data-opt="sound" aria-pressed="true"><i></i><span data-t="optSound"></span></button>
          <button class="opt" data-opt="voice" aria-pressed="false"><i></i><span data-t="optVoice"></span></button>
          <button class="opt" data-opt="haptic" aria-pressed="false"><i></i><span data-t="optHaptic"></span></button>
        </div>
      </div>
    </div>

    <div class="spacer"></div>
    <button class="cta" id="start"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span data-t="begin"></span></button>
    <p class="hint" data-t="hint"></p>
  </section>

  <!-- SESSION -->
  <section class="view" id="session">
    <div class="phase">
      <div class="prep" id="prepLabel" hidden></div>
      <div class="word" id="phaseWord"></div>
      <div class="count" id="phaseCount"></div>
    </div>
    <div class="wavewrap"><canvas id="wave"></canvas></div>
    <div>
      <div class="meta">
        <span><b id="remain">00:00</b> <span data-t="left"></span></span>
        <span><b id="cycles">0</b> <span data-t="cyclesLbl"></span></span>
      </div>
      <div class="bar"><span id="prog"></span></div>
      <div class="ctrls">
        <button class="ctrl" id="pause" data-t="pause"></button>
        <button class="ctrl pri" id="stop" data-t="finish"></button>
      </div>
    </div>
  </section>

  <!-- DONE -->
  <section class="view" id="done">
    <div>
      <h2 data-t="doneTitle"></h2>
      <p data-t="doneSub"></p>
    </div>
    <div class="stats">
      <div class="stat"><b id="dMin">0</b><span data-t="statMin"></span></div>
      <div class="stat"><b id="dCyc">0</b><span data-t="statCyc"></span></div>
      <div class="stat"><b id="dRate">0</b><span data-t="statRate"></span></div>
    </div>
    <div class="today"><span data-t="todayLbl"></span><span class="pips" id="pips"><i></i><i></i><i></i></span><span id="pipCount"></span></div>
    <button class="cta" id="again"><span data-t="again"></span></button>
  </section>

</div>

<script>
"use strict";

const T={
 fr:{h1a:"Six respirations",h1b:"par minute.",
  tagline:"À ce rythme, le cœur et le souffle se synchronisent. Trois séances de cinq minutes par jour suffisent.",
  lblProto:"Rythme",lblDur:"Durée",lblGuide:"Guidage",
  optSound:"Son",optVoice:"Voix",optHaptic:"Vibration",
  begin:"Commencer",hint:"Espace pour la pause, Échap pour arrêter",
  sIn:"Inspiration",sHold1:"Poumons pleins",sOut:"Expiration",sHold2:"Poumons vides",
  inhale:"Inspirez",hold:"Retenez",exhale:"Expirez",holdOut:"Restez vide",
  prep:"Installez-vous",left:"restant",cyclesLbl:"cycles",
  pause:"Pause",resume:"Reprendre",finish:"Terminer",
  doneTitle:"C'est fait.",doneSub:"Gardez les yeux fermés encore quelques secondes.",
  statMin:"minutes",statCyc:"cycles",statRate:"cycles / min",
  todayLbl:"Aujourd'hui",again:"Nouvelle séance",
  rate:n=>n+" cycles par minute",pip:(a,b)=>a+" sur "+b,
  protos:[
   {id:"365",name:"365",desc:"Le rythme de référence de la cohérence cardiaque."},
   {id:"calm",name:"Apaisement",desc:"L'expiration plus longue fait descendre la tension."},
   {id:"square",name:"Carré",desc:"Quatre temps égaux, pour se recentrer."},
   {id:"478",name:"4-7-8",desc:"Pour glisser vers le sommeil."},
   {id:"custom",name:"Sur mesure",desc:"Vos propres durées, seconde par seconde."}],
  durs:[{v:180,l:"3 min"},{v:300,l:"5 min"},{v:600,l:"10 min"},{v:900,l:"15 min"}],
  voice:{inhale:"Inspirez",hold:"Retenez",exhale:"Expirez",holdOut:"Restez vide"},lang:"fr-FR"},
 en:{h1a:"Six breaths",h1b:"a minute.",
  tagline:"At this pace, heart and breath fall into step. Three five minute sessions a day are enough.",
  lblProto:"Pace",lblDur:"Length",lblGuide:"Guidance",
  optSound:"Sound",optVoice:"Voice",optHaptic:"Vibration",
  begin:"Start",hint:"Space to pause, Esc to stop",
  sIn:"Breathe in",sHold1:"Lungs full",sOut:"Breathe out",sHold2:"Lungs empty",
  inhale:"Breathe in",hold:"Hold",exhale:"Breathe out",holdOut:"Stay empty",
  prep:"Settle in",left:"left",cyclesLbl:"cycles",
  pause:"Pause",resume:"Resume",finish:"Finish",
  doneTitle:"Done.",doneSub:"Keep your eyes closed a few seconds longer.",
  statMin:"minutes",statCyc:"cycles",statRate:"cycles / min",
  todayLbl:"Today",again:"New session",
  rate:n=>n+" cycles per minute",pip:(a,b)=>a+" of "+b,
  protos:[
   {id:"365",name:"365",desc:"The reference pace of cardiac coherence."},
   {id:"calm",name:"Calming",desc:"A longer out breath brings the pressure down."},
   {id:"square",name:"Box",desc:"Four equal counts, to steady yourself."},
   {id:"478",name:"4-7-8",desc:"To slide into sleep."},
   {id:"custom",name:"Your own",desc:"Set every count yourself, second by second."}],
  durs:[{v:180,l:"3 min"},{v:300,l:"5 min"},{v:600,l:"10 min"},{v:900,l:"15 min"}],
  voice:{inhale:"Breathe in",hold:"Hold",exhale:"Breathe out",holdOut:"Stay empty"},lang:"en-GB"}
};
const PAT={"365":[5,0,5,0],calm:[4,0,6,0],square:[4,4,4,4],"478":[4,7,8,0],custom:[5,0,5,0]};
const KEYS=["inhale","hold","exhale","holdOut"];

const S={lang:"fr",theme:"light",proto:"365",duration:300,
 opts:{sound:true,voice:false,haptic:false},
 running:false,paused:false,elapsed:0,lastFrame:0,
 phase:0,phaseT:0,cycles:0,prep:3,inPrep:false,closing:false,breath:0,history:[]};

const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s)), L=()=>T[S.lang];
const num=id=>parseFloat($("#"+id).value);
const pattern=()=>S.proto==="custom"?[num("rIn"),num("rHold1"),num("rOut"),num("rHold2")]:PAT[S.proto].slice();
const cycleLen=()=>pattern().reduce((a,b)=>a+b,0);
const rateVal=()=>Math.round(600/cycleLen())/10;
const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.floor(s%60)).padStart(2,"0");

/* ---- rendu ---- */
function buildProtos(){
  const w=$("#protos"); w.innerHTML="";
  L().protos.forEach(p=>{
    const b=document.createElement("button");
    b.className="pill"; b.textContent=p.name; b.dataset.proto=p.id;
    b.setAttribute("aria-pressed",String(S.proto===p.id));
    b.onclick=()=>{S.proto=p.id;selectProto();};
    w.appendChild(b);
  });
  selectProto();
}
function selectProto(){
  $$("#protos .pill").forEach(x=>x.setAttribute("aria-pressed",String(x.dataset.proto===S.proto)));
  $("#sliders").classList.toggle("on",S.proto==="custom");
  const p=L().protos.find(x=>x.id===S.proto);
  const beats=pattern().filter(n=>n>0).map(n=>String(n).replace(".0","")).join(" · ");
  $("#protoInfo").innerHTML="";
  const b=document.createElement("b"); b.textContent=beats;
  const s=document.createElement("span"); s.textContent=S.proto==="custom"?L().rate(rateVal()):p.desc;
  $("#protoInfo").append(b,s);
}
function buildDurs(){
  const w=$("#durs"); w.innerHTML="";
  L().durs.forEach(d=>{
    const b=document.createElement("button");
    b.className="pill"; b.textContent=d.l;
    b.setAttribute("aria-pressed",String(S.duration===d.v));
    b.onclick=()=>{S.duration=d.v;$$("#durs .pill").forEach((x,i)=>x.setAttribute("aria-pressed",String(L().durs[i].v===d.v)));};
    w.appendChild(b);
  });
}
function updateSliders(){
  ["In","Hold1","Out","Hold2"].forEach(k=>{$("#o"+k).textContent=String(num("r"+k)).replace(".0","")+" s";});
  if(S.proto==="custom") selectProto();
}
function applyLang(){
  document.documentElement.lang=S.lang;
  $$("[data-t]").forEach(el=>{const v=L()[el.dataset.t];if(typeof v==="string")el.textContent=v;});
  $$(".lang button").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.lang===S.lang)));
  buildProtos(); buildDurs(); updateSliders();
  $("#pause").textContent=S.paused?L().resume:L().pause;
}

/* ---- guidage ---- */
let AC=null;
function tone(f,d){
  if(!S.opts.sound) return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;
    o.type="sine"; o.frequency.value=f;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.16,t+.12);
    g.gain.exponentialRampToValueAtTime(.0001,t+d);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+d+.05);
  }catch(e){}
}
function say(txt){
  if(!S.opts.voice||!window.speechSynthesis) return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang=L().lang;u.rate=.9;u.volume=.9;speechSynthesis.speak(u);}catch(e){}
}
const buzz=ms=>{if(S.opts.haptic&&navigator.vibrate)navigator.vibrate(ms);};

/* ---- moteur ---- */
let wakeLock=null;
const nextIdx=(from,pat)=>{for(let i=1;i<=4;i++){const k=(from+i)%4;if(pat[k]>0)return k;}return from;};

function startSession(){
  const pat=pattern(); if(cycleLen()<4) return;
  Object.assign(S,{running:true,paused:false,elapsed:0,cycles:0,phaseT:0,prep:3,inPrep:true,closing:false,breath:0,history:[]});
  S.phase=pat[0]>0?0:nextIdx(0,pat);
  show("session");
  $("#prepLabel").hidden=false; $("#prepLabel").textContent=L().prep;
  $("#phaseWord").textContent=""; $("#pause").textContent=L().pause;
  $("#remain").textContent=fmt(S.duration); $("#cycles").textContent="0"; $("#prog").style.width="0%";
  sizeCanvas(); wake();
  S.lastFrame=performance.now(); requestAnimationFrame(loop);
}
async function wake(){try{if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen");}catch(e){}}
function unwake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}

function loop(now){
  if(!S.running) return;
  const dt=Math.min((now-S.lastFrame)/1000,.1); S.lastFrame=now;
  if(!S.paused) step(dt);
  draw(now/1000);
  requestAnimationFrame(loop);
}
function step(dt){
  const pat=pattern();
  if(S.inPrep){
    const before=Math.ceil(S.prep); S.prep-=dt; const after=Math.ceil(S.prep);
    if(after!==before&&after>0) tone(392,.5);
    $("#phaseCount").textContent=Math.max(1,after);
    if(S.prep<=0){S.inPrep=false;$("#prepLabel").hidden=true;announce();}
    return;
  }
  S.elapsed+=dt; S.phaseT+=dt;
  if(S.phaseT>=pat[S.phase]){
    S.phaseT-=pat[S.phase];
    const n=nextIdx(S.phase,pat);
    if(n<=S.phase){S.cycles++; if(S.closing||S.elapsed>=S.duration) return finish();}
    S.phase=n; announce();
  }
  if(S.elapsed>=S.duration) S.closing=true;
  const p=Math.min(S.phaseT/pat[S.phase],1), e=v=>(1-Math.cos(Math.PI*v))/2;
  S.breath=S.phase===0?e(p):S.phase===1?1:S.phase===2?1-e(p):0;
  $("#phaseCount").textContent=Math.max(1,Math.ceil(pat[S.phase]-S.phaseT));
  $("#remain").textContent=fmt(Math.max(0,S.duration-S.elapsed));
  $("#cycles").textContent=S.cycles;
  $("#prog").style.width=Math.min(100,S.elapsed/S.duration*100)+"%";
}
function announce(){
  const k=KEYS[S.phase], el=$("#phaseWord");
  el.style.opacity=0;
  setTimeout(()=>{el.textContent=L()[k];el.style.opacity=1;},110);
  tone([523.25,587.33,392,349.23][S.phase],S.phase%2===0?.7:.4);
  say(L().voice[k]); buzz(S.phase===0?40:25);
}
function togglePause(){
  if(!S.running) return;
  S.paused=!S.paused;
  $("#pause").textContent=S.paused?L().resume:L().pause;
  if(S.paused&&window.speechSynthesis) speechSynthesis.cancel();
}
function finish(){
  const c=S.cycles, m=Math.round(S.elapsed/60);
  stopSession();
  $("#dMin").textContent=m; $("#dCyc").textContent=c; $("#dRate").textContent=rateVal();
  tone(523.25,1.2); setTimeout(()=>tone(659.25,1.4),220);
  logSession(m); show("done");
}
function stopSession(){S.running=false;S.paused=false;unwake();if(window.speechSynthesis)speechSynthesis.cancel();}

/* ---- courbe ---- */
const cv=$("#wave"), ctx=cv.getContext("2d");
let W=0,H=0; const WIN=20;
function sizeCanvas(){
  const d=Math.min(window.devicePixelRatio||1,2), r=cv.getBoundingClientRect();
  W=r.width; H=r.height; cv.width=Math.round(W*d); cv.height=Math.round(H*d);
  ctx.setTransform(d,0,0,d,0,0);
}
addEventListener("resize",()=>{if(S.running)sizeCanvas();});
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function rgba(hex,a){
  const h=hex.replace("#",""), n=parseInt(h.length===3?h.split("").map(c=>c+c).join(""):h,16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}
function draw(now){
  if(!S.paused) S.history.push({t:now,v:S.breath});
  while(S.history.length&&S.history[0].t<now-WIN) S.history.shift();
  ctx.clearRect(0,0,W,H);
  if(S.history.length<2) return;
  const curve=css("--curve"), accent=css("--accent"), pad=13;
  const X=t=>(W-pad)-((now-t)/WIN)*(W-pad), Y=v=>H-(H*.12+v*H*.74);
  ctx.strokeStyle=css("--line"); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,Y(0)+.5); ctx.lineTo(W,Y(0)+.5); ctx.stroke();
  const path=()=>{ctx.beginPath();S.history.forEach((p,i)=>{const x=X(p.t),y=Y(p.v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});};
  const last=S.history[S.history.length-1], lx=X(last.t), ly=Y(last.v);
  path();
  ctx.lineTo(lx,Y(0)); ctx.lineTo(X(S.history[0].t),Y(0)); ctx.closePath();
  const g=ctx.createLinearGradient(0,Y(1),0,H);
  g.addColorStop(0,rgba(curve,.22)); g.addColorStop(1,rgba(curve,0));
  ctx.fillStyle=g; ctx.fill();
  path();
  ctx.strokeStyle=curve; ctx.lineWidth=2.4; ctx.lineJoin="round"; ctx.lineCap="round"; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly,12,0,7); ctx.fillStyle=rgba(accent,.16); ctx.fill();
  ctx.beginPath(); ctx.arc(lx,ly,5.5,0,7); ctx.fillStyle=accent; ctx.fill();
}

/* ---- séances du jour ---- */
let mem=[];
async function logSession(m){
  const day=new Date().toDateString();
  mem.push({day:day,mins:m});
  try{
    if(window.storage){
      const r=await window.storage.get("cc:history").catch(()=>null);
      const arr=r?JSON.parse(r.value):[];
      arr.push({day:day,mins:m});
      await window.storage.set("cc:history",JSON.stringify(arr.slice(-90)));
      mem=arr;
    }
  }catch(e){}
  renderToday();
}
function renderToday(){
  const day=new Date().toDateString(), n=mem.filter(x=>x.day===day).length;
  $$("#pips i").forEach((el,i)=>el.classList.toggle("full",i<Math.min(n,3)));
  $("#pipCount").textContent=L().pip(Math.min(n,3),3);
}
(async()=>{try{if(window.storage){const r=await window.storage.get("cc:history").catch(()=>null);if(r)mem=JSON.parse(r.value)||[];renderToday();}}catch(e){}})();

/* ---- navigation ---- */
const show=id=>{$$(".view").forEach(v=>v.classList.toggle("on",v.id===id));scrollTo({top:0});};

$$(".lang button").forEach(b=>b.onclick=()=>{
  S.lang=b.dataset.lang; applyLang();
  if(S.running&&!S.inPrep) $("#phaseWord").textContent=L()[KEYS[S.phase]];
  if($("#done").classList.contains("on")) renderToday();
});
$("#theme").onclick=()=>{S.theme=S.theme==="light"?"dark":"light";document.documentElement.dataset.theme=S.theme;};
$$(".opt").forEach(b=>b.onclick=()=>{
  const k=b.dataset.opt; S.opts[k]=!S.opts[k];
  b.setAttribute("aria-pressed",String(S.opts[k]));
  if(S.opts[k]){ if(k==="sound")tone(523.25,.4); if(k==="voice")say(L().voice.inhale); if(k==="haptic")buzz(30); }
});
["rIn","rHold1","rOut","rHold2"].forEach(id=>$("#"+id).oninput=()=>{
  if(S.proto!=="custom"){S.proto="custom";}
  updateSliders(); selectProto();
});
$("#start").onclick=startSession;
$("#again").onclick=()=>show("setup");
$("#pause").onclick=togglePause;
$("#stop").onclick=()=>{if(S.elapsed>20)return finish();stopSession();show("setup");};
addEventListener("keydown",e=>{
  if(e.code==="Space"&&S.running){e.preventDefault();togglePause();}
  if(e.key==="Escape"&&S.running){stopSession();show("setup");}
  if(e.key==="Enter"&&$("#setup").classList.contains("on")) startSession();
});
document.addEventListener("visibilitychange",()=>{if(document.hidden&&S.running&&!S.paused)togglePause();});

if(matchMedia("(prefers-color-scheme: dark)").matches){S.theme="dark";document.documentElement.dataset.theme="dark";}
applyLang(); renderToday();
</script>
</body>
