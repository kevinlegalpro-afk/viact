  function onHlSelect(){
    if(!hlActive||hlActive==='erase')return;
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed)return;
    const r=sel.getRangeAt(0);const txt=String(sel).trim();
    if(txt.length<2)return;
    const host=(r.commonAncestorContainer.nodeType===1?r.commonAncestorContainer:r.commonAncestorContainer.parentElement).closest('.b');
    if(!host||!contentEl.contains(host))return;
    if(host.querySelector('input,textarea'))return;
    try{
      const mk=document.createElement('mark');mk.className='hl';mk.dataset.c=hlActive;mk.style.background=hlActive;
      r.surroundContents(mk);
      bindEraser(mk);
      const lid=lessons[state.idx]?lessons[state.idx].l.id:'x';
      state.hl[lid]=state.hl[lid]||[];
      state.hl[lid].push({bid:host.dataset.bid||'',t:txt,c:hlActive});
      persist();
    }catch(e){}
    sel.removeAllRanges();
  }
  function bindEraser(mk){
    mk.onclick=()=>{
      if(hlActive!=='erase')return;
      const lid=lessons[state.idx]?lessons[state.idx].l.id:'x';
      const t=mk.textContent.trim();
      state.hl[lid]=(state.hl[lid]||[]).filter(h=>h.t!==t);
      const par=mk.parentNode;while(mk.firstChild)par.insertBefore(mk.firstChild,mk);
      par.removeChild(mk);par.normalize();persist();
    };
  }
  function restoreHighlights(l){
    const arr=(state.hl||{})[l.id];if(!arr||!arr.length)return;
    arr.forEach(h=>{
      const host=h.bid?contentEl.querySelector('.b[data-bid="'+h.bid+'"]'):contentEl;
      if(!host)return;
      const w=document.createTreeWalker(host,NodeFilter.SHOW_TEXT,null);
      let node;
      while((node=w.nextNode())){
        if(node.parentElement&&node.parentElement.closest('mark.hl'))continue;
        const i=node.nodeValue.indexOf(h.t);
        if(i<0)continue;
        try{
          const r=document.createRange();r.setStart(node,i);r.setEnd(node,i+h.t.length);
          const mk=document.createElement('mark');mk.className='hl';mk.dataset.c=h.c;mk.style.background=h.c;
          r.surroundContents(mk);bindEraser(mk);
        }catch(e){}
        break;
      }
    });
  }
  function renderPostits(b){
    const d=document.createElement('div');d.className='b';d.dataset.bid=b.id;
    state.postits=state.postits||{};
    const cols=b.cols||3;const palette=(b.colors&&b.colors.length)?b.colors:['#ffd97d'];
    d.innerHTML='<div class="pit-card"><div class="pit-q">'+E(b.prompt||'')+'</div><div class="pit-board" style="grid-template-columns:repeat('+cols+',1fr)"></div>'+
      '<button class="bbtn soft pit-add">+ '+E(b.addLabel||T('Ajouter un post-it'))+'</button></div>';
    const board=d.querySelector('.pit-board');
    const save=()=>{persist();};
    function draw(){
      const arr=state.postits[b.id]||[];
      board.innerHTML='';
      arr.forEach((it,i)=>{
        const n=document.createElement('div');n.className='pit';n.style.background=it.c||palette[0];n.dataset.i=i;
        n.innerHTML='<button class="pit-grab" title="Déplacer ce post-it" aria-label="Déplacer">⠿</button>'+
          '<textarea placeholder="'+E(b.placeholder||'')+'">'+E(it.t||'')+'</textarea>'+
          '<div class="pit-tools"><div class="pit-cols"></div><button class="pit-del" title="Supprimer">✕</button></div>';
        const ta=n.querySelector('textarea');
        ta.oninput=()=>{it.t=ta.value;save();};
        const cw=n.querySelector('.pit-cols');
        palette.forEach(c=>{const s2=document.createElement('button');s2.className='pit-sw'+(c===it.c?' on':'');s2.style.background=c;
          s2.onclick=()=>{it.c=c;save();draw();};cw.appendChild(s2);});
        n.querySelector('.pit-del').onclick=()=>{arr.splice(i,1);save();draw();};
        // déplacement (souris et doigt)
        const grab=n.querySelector('.pit-grab');
        grab.addEventListener('pointerdown',ev=>{
          ev.preventDefault();
          const list=state.postits[b.id];let from=+n.dataset.i;
          n.classList.add('pit-drag');
          try{grab.setPointerCapture(ev.pointerId);}catch(e){}
          const move=e2=>{
            const el=document.elementFromPoint(e2.clientX,e2.clientY);
            const tgt=el&&el.closest?el.closest('.pit'):null;
            if(!tgt||tgt===n||!board.contains(tgt))return;
            const to=+tgt.dataset.i;
            if(to===from||isNaN(to))return;
            const [it2]=list.splice(from,1);list.splice(to,0,it2);
            from=to;save();draw();
            const again=board.querySelector('.pit[data-i="'+to+'"]');
            if(again){again.classList.add('pit-drag');
              const g2=again.querySelector('.pit-grab');
              try{g2.setPointerCapture(e2.pointerId);}catch(e){}
              g2.addEventListener('pointermove',move);g2.addEventListener('pointerup',up);g2.addEventListener('pointercancel',up);
              grab.removeEventListener('pointermove',move);grab.removeEventListener('pointerup',up);
            }
          };
          const up=()=>{
            board.querySelectorAll('.pit').forEach(x=>x.classList.remove('pit-drag'));
            grab.removeEventListener('pointermove',move);grab.removeEventListener('pointerup',up);grab.removeEventListener('pointercancel',up);
          };
          grab.addEventListener('pointermove',move);grab.addEventListener('pointerup',up);grab.addEventListener('pointercancel',up);
        });
        board.appendChild(n);
      });
      if(!arr.length)board.innerHTML='<div class="pit-empty">'+T('Aucune idée pour le moment.')+'</div>';
    }
    d.querySelector('.pit-add').onclick=()=>{
      state.postits[b.id]=state.postits[b.id]||[];
      state.postits[b.id].push({t:'',c:palette[state.postits[b.id].length%palette.length]});
      save();draw();
      setTimeout(()=>{const tas=board.querySelectorAll('textarea');if(tas.length)tas[tas.length-1].focus();},30);
    };
    draw();
    return d;
  }

  function bandCss(pbg){
    if(!pbg)return '';
    if(pbg.type==='color')return 'background-color:'+pbg.color+';';
    if(pbg.type==='image')return 'background-image:url('+pbg.image+');background-size:'+(pbg.size==='repeat'?'auto':pbg.size)+';background-position:center;background-repeat:'+(pbg.size==='repeat'?'repeat':'no-repeat')+';';
    return '';
  }
  // couleur de fond en vigueur à chaque bloc (null = fond du thème)
  function effBgSeq(blocks){
    let cur=null;const seq=[];
    blocks.forEach(b=>{const p=blockPageBg(b);
      if(b.type==='spacer'){seq.push((p&&p.type==='color')?p.color:cur);return;}
      if(p)cur=(p.type==='color'?p.color:null);seq.push(cur);});
    return seq;
  }
  // découpe les blocs en sections ; les séparateurs sont collés ENTRE les sections
  /* Hauteur utile d'un bloc pour le calcul de chevauchement.
     Seuls les blocs à hauteur fixe sont connus d'avance ; les autres sont réputés
     assez grands (le texte fait au moins quelques dizaines de pixels). */
  function ovHeightOf(b){
    if(!b)return 0;
    if(b.type==='spacer')return Math.max(0,+b.height||0);
    if(b.type==='divider')return Math.max(0,+b.height||60);
    return 1e6;
  }
  /* Deux transitions qui encadrent un espaceur revendiquaient chacune toute leur hauteur.
     Sur un espaceur court, elles l'avalaient entièrement : plus rien à voir ni à cliquer.
     On répartit donc la place disponible et on laisse toujours une bande au voisin. */
  const OV_FLOOR=44;
  function ovSideOf(b,prev,next){
    // même règle que le rendu : la transition se pose sur la photo du voisin
    if(b.type!=='divider'||b.useNeighborImg===false)return null;
    const img=x=>{
      if(!x)return null;
      if(x.type==='spacer'&&x.fill==='image'&&x.img)return x.img;
      if(x.box&&x.box.pageBg==='image'&&x.box.pageImage)return x.box.pageImage;
      return null;
    };
    if(img(next))return 'bottom';
    if(img(prev))return 'top';
    return null;
  }
  function ovLimits(blocks){
    const lim={},side={};
    blocks.forEach((b,i)=>{
      if(b.type!=='divider')return;
      lim[b.id]=Math.max(0,+b.height||60);
      side[b.id]=ovSideOf(b,blocks[i-1],blocks[i+1]);
    });
    blocks.forEach((b,i)=>{
      if(b.type==='divider')return;
      const room=ovHeightOf(b);
      if(room>=1e6)return;                       // voisin de hauteur libre : rien à plafonner
      const claim=[];
      const prev=blocks[i-1],next=blocks[i+1];
      if(prev&&prev.type==='divider'&&side[prev.id]==='bottom')claim.push(prev);
      if(next&&next.type==='divider'&&side[next.id]==='top')claim.push(next);
      if(!claim.length)return;
      const budget=Math.max(0,room-OV_FLOOR);   // le voisin garde toujours une bande
      const want=claim.reduce((a,d)=>a+(lim[d.id]||0),0);
      if(want<=budget)return;
      const k=want?budget/want:0;
      claim.forEach(d=>{lim[d.id]=Math.floor((lim[d.id]||0)*k);});
    });
    return lim;
  }
  function sectionize(host,blocks,headEl,makeItem){
    const seq=effBgSeq(blocks);
    try{window.__OVLIM__=ovLimits(blocks);}catch(e){window.__OVLIM__=null;}
    let sec=null,secIn=null,curPbg=null,lastSec=null,noPt=false;
    function openSec(pbg){
      sec=document.createElement('div');
      sec.className='sec'+(pbg?' has-bg':'')+(noPt?' no-pt':'');
      noPt=false;
      if(pbg)sec.setAttribute('style',bandCss(pbg));
      host.appendChild(sec);lastSec=sec;
      secIn=document.createElement('div');secIn.className='sec-in';sec.appendChild(secIn);
    }
    function ensure(){if(!sec)openSec(curPbg);}
    openSec(null);
    if(headEl)secIn.appendChild(headEl);
    blocks.forEach((b,i)=>{
      const p=blockPageBg(b);
      if(p&&b.type!=='spacer'){curPbg=p;sec=null;}
      const spCol=x=>{
        if(!x||x.type!=='spacer')return null;
        if(x.fill==='color'&&x.color)return x.color;
        if(x.box&&x.box.pageBg==='color'&&x.box.pageColor)return x.box.pageColor;
        return null;
      };
      b.__bgTop=spCol(blocks[i-1])||seq[i];
      b.__bgBot=spCol(blocks[i+1])||((i+1<blocks.length)?seq[i+1]:seq[i]);
      // photo d'un espaceur voisin, pour prolonger l'image dans le séparateur
      const spImg=x=>{
        if(!x)return null;
        if(x.type==='spacer'&&x.fill==='image'&&x.img)return x.img;
        if(x.box&&x.box.pageBg==='image'&&x.box.pageImage)return x.box.pageImage;
        return null;
      };
      b.__imgTop=spImg(blocks[i-1]);
      b.__imgBot=spImg(blocks[i+1]);
      const item=makeItem(b,i);
      if(b.type==='divider'){
        // collé entre les sections : on supprime les rembourrages de jonction
        if(lastSec)lastSec.classList.add('no-pb');
        sec=null;noPt=true;
        host.appendChild(item);return;
      }
      if(b.type==='spacer'){
        if(p){
          // fond propre à l'espaceur : section dédiée sans rembourrage, puis retour au fond précédent
          openSec(p);sec.classList.add('sec-flush');sec.appendChild(item);
          if(lastSec)lastSec.classList.add('no-pb');
          sec=null;noPt=true;
        } else {
          ensure();sec.appendChild(item);
          secIn=document.createElement('div');secIn.className='sec-in';sec.appendChild(secIn);
        }
        return;
      }
      ensure();
      secIn.appendChild(item);
    });
  }

  var glossaryPref=null;
  function glossaryEnabled(){
    if(!C.glossary||!C.glossary.length)return false;

    if(glossaryPref===null){try{glossaryPref=localStorage.getItem('gloss_'+(C.meta.title||'c'));}catch(e){}}

  function gEscRx(x){return x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  function applyGlossary(root){
    if(!glossaryEnabled())return;
    var terms=C.glossary.filter(function(g){return g.term&&g.term.trim();})
      .sort(function(a,b){return b.term.length-a.term.length;});
    if(!terms.length)return;
    var used={};
    var SKIP='a,button,input,textarea,select,h1,h2,h3,h4,h5,h6,.ie-term,.acc-head,.glossary-term,code,pre,[contenteditable]';
    var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
      if(!n.nodeValue||!n.nodeValue.trim())return NodeFilter.FILTER_REJECT;
      if(n.parentElement&&n.parentElement.closest(SKIP))return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }});
    var textNodes=[];var nn;while((nn=walker.nextNode()))textNodes.push(nn);
    textNodes.forEach(function(node){
      var txt=node.nodeValue;
      for(var t=0;t<terms.length;t++){
        var g=terms[t];var key=g.term.toLowerCase();
        if(used[key])continue;
        var rx;try{rx=new RegExp('(^|[^\\p{L}\\p{N}_])('+gEscRx(g.term)+')(?![\\p{L}\\p{N}_])','iu');}
        catch(e){rx=new RegExp('(^|[^\\w])('+gEscRx(g.term)+')(?![\\w])','i');}
        var m=rx.exec(txt);
        if(!m)continue;
        used[key]=true;
        var start=m.index+m[1].length;var matched=txt.substr(start,m[2].length);
        var before=document.createTextNode(txt.slice(0,start));
        var after=document.createTextNode(txt.slice(start+matched.length));
        var btn=document.createElement('button');
        btn.className='glossary-term';btn.type='button';btn.textContent=matched;
        btn.setAttribute('aria-label',matched+' \u2013 '+T('définition'));
        btn.setAttribute('aria-expanded','false');btn.dataset.def=g.def||'';
        var parent=node.parentNode;
        parent.insertBefore(before,node);parent.insertBefore(btn,node);parent.insertBefore(after,node);
        parent.removeChild(node);
        node=after; txt=after.nodeValue;
      }
    });
    wireGlossaryTips(root);
  }

  function buildInteractiveVideo(b){

    function decide(card,right){

      for(var k=Math.min(rec.idx+2,cards.length-1);k>=rec.idx;k--){

    function wireDrag(el,card){

      el.__fly=fly;
      el.addEventListener('mousedown',function(e){down(e.clientX,e.clientY);});
      window.addEventListener('mousemove',function(e){move(e.clientX);});
      window.addEventListener('mouseup',up);
      el.addEventListener('touchstart',function(e){var t=e.touches[0];down(t.clientX,t.clientY);},{passive:true});
      el.addEventListener('touchmove',function(e){var t=e.touches[0];move(t.clientX);},{passive:true});
      el.addEventListener('touchend',up);
    }
    bNo.onclick=function(){var top=stage.querySelector('.swipe-card.is-top');if(top&&top.__fly)top.__fly(false);else decide(cards[rec.idx],false);};
    bYes.onclick=function(){var top=stage.querySelector('.swipe-card.is-top');if(top&&top.__fly)top.__fly(true);else decide(cards[rec.idx],true);};
    if(!cards.length){wrap.innerHTML='<p class="swipe-empty">'+T('Aucune carte définie.')+'</p>';return wrap;}
    draw();
    return wrap;
  }

  function renderLesson(i){
    state.idx=i;persist();
    const {m,l}=lessons[i];
    onQuizAnswered=updateChrome;
    contentEl.innerHTML='';
    const head=document.createElement('div');
    head.innerHTML='<div class="les-kicker">'+E(m.title)+'</div><h1 class="les-h1">'+E(l.title)+'</h1>';
    let g=0;l.blocks.forEach(b=>{b.__gate=g;if(b.type==='continue')g++;});
    const altSet={};l.blocks.forEach(b=>{if(b.altFor)altSet[b.altFor]=1;});
    sectionize(contentEl,l.blocks,head,b=>{
      const el=renderBlock(b);
      el.dataset.gate=b.__gate||0;
      if(b.__gate>0)el.classList.add('gated');
      if(b.altFor){el.dataset.altfor=b.altFor;el.classList.add('alt-block');}
      else if(altSet[b.id]){el.dataset.hasalt='1';el.classList.add('has-alt');}
      return el;
    });
    buildAltToggle();
    runHtmlScripts(contentEl);
    applyGlossary(contentEl);
    buildGlossaryBar();
    updGlobalProg();
    wireGates();
    wireReveal();
    buildHighlighter();
    buildReview();
    buildBadges();
    checkBadges();
    restoreHighlights(l);

    const footSec=document.createElement('div');footSec.className='sec';
    const footIn=document.createElement('div');footIn.className='sec-in';footSec.appendChild(footIn);
    contentEl.appendChild(footSec);
    const foot=document.createElement('div');foot.className='les-foot';
    const isLast=i===lessons.length-1;
    foot.innerHTML='<button class="foot-btn foot-prev"'+(i===0?' style="visibility:hidden"':'')+'>'+ico.prev+' Précédent</button>'+
      '<button class="foot-btn foot-next">'+(isLast?T('Terminer'):T('Suivant'))+' '+ico.next+'</button>';
    footIn.appendChild(foot);
    foot.querySelector('.foot-prev').onclick=()=>{if(i>0)goToLesson(i-1);};
    const nextBtn=foot.querySelector('.foot-next');
    nextBtn.disabled=!lessonCompletable(l);
    nextBtn.onclick=()=>{
      if(!lessonCompletable(l))return;
      state.done[l.id]=true;persist();reportScore();maybeComplete();
      if(isLast)showComplete();else goToLesson(i+1);
    };
    if(mmTitle)mmTitle.textContent=l.title;
    updateChrome();
  }

  function goToLesson(i){renderLesson(i);window.scrollTo({top:0,behavior:'smooth'});}

  function showComplete(){
    lessons.forEach(({l})=>{}); // état déjà marqué
    const T=totals();const scored=C.settings.scored!==false;
    const pct=(scored&&T.max>0)?Math.round(T.got/T.max*100):null;const pass=C.settings.passScore||0;
    let score='';
    if(pct!==null){score='<div class="scoreboard"><div><div class="v">'+pct+'%</div><div class="l">Score</div></div><div><div class="v">'+T.got+'/'+T.max+'</div><div class="l">Points</div></div><div><div class="v">'+(pct>=pass?'Réussi':T('À revoir'))+'</div><div class="l">Résultat</div></div></div>';}
    else score='<div class="scoreboard"><div><div class="v">'+doneCount()+'/'+totalLessons()+'</div><div class="l">Leçons</div></div></div>';
    const big='<svg viewBox="0 0 24 24" width="44" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>';
    contentEl.innerHTML='<div class="sec"><div class="sec-in" style="padding-top:54px"><div class="complete-banner"><div class="big">'+big+'</div><h2>Félicitations !</h2><p>Vous avez terminé «&nbsp;'+E(C.meta.title)+'&nbsp;».</p>'+score+
      '<div style="margin-top:8px">'+(C.settings.allowNotes&&hasReflect()?'<button class="foot-btn foot-next" id="dlNotes" style="margin-right:10px">'+ico.note+' Mes notes</button>':'')+'<button class="foot-btn foot-prev" id="reReview">Revoir le cours</button></div></div></div></div>';
    const dn=document.getElementById('dlNotes');if(dn)dn.onclick=function(){downloadNotes();};
    document.getElementById('reReview').onclick=()=>goToLesson(0);
    SCORM.set('cmi.core.lesson_status', pct!==null?(pct>=pass?'passed':'failed'):'completed');SCORM.save();
    updateChrome();window.scrollTo({top:0,behavior:'smooth'});
  }

  // ---- Collecte des notes de l'apprenant ----
  function collectNotes(only){
    const excl=C.settings.notesExclude||[];
    const out={refl:[],pits:[],hl:[],any:false};
    lessons.forEach(function(o){
      o.l.blocks.forEach(function(b){
        if(b.type==='reflect'&&excl.indexOf(b.id)<0&&(!only||only.indexOf(b.id)>=0)){
          const v=state.notes[b.id]||'';
          out.refl.push({q:b.prompt||'Réflexion',v:v,les:o.l.title});
          if(v.trim())out.any=true;
        }
        if(b.type==='postit'&&(!only||only.indexOf(b.id)>=0)){
          const arr=((state.postits||{})[b.id]||[]).filter(function(x){return x.t&&x.t.trim();});
          if(arr.length){out.pits.push({q:b.prompt||'Post-its',items:arr,les:o.l.title});out.any=true;}
        }
        if(b.type==='swipesort'&&(!only||only.indexOf(b.id)>=0)){
          const rec=(state.swipe||{})[b.id];
          if(rec&&rec.kept&&rec.kept.length){out.pits.push({q:b.prompt||T('Cartes gardées'),items:rec.kept.map(function(t){return {t:t};}),les:o.l.title});out.any=true;}
        }
        if(b.type==='videoreflect'&&(!only||only.indexOf(b.id)>=0)){
          const vn=(state.vnotes||{})[b.id]||{};
          (b.stops||[]).forEach(function(st){const v=vn[st.t];if(v&&v.trim()){out.refl.push({q:(st.q||T('Réflexion'))+' ('+(st.t||0)+'s)',v:v,les:o.l.title});out.any=true;}});
        }
      });
    });
    if(!only||only.indexOf('__hl')>=0){
      lessons.forEach(function(o){
        const arr=(state.hl||{})[o.l.id]||[];
        if(arr.length){out.hl.push({les:o.l.title,items:arr});out.any=true;}
      });
    }
    return out;
  }
  function notesFileName(){return (C.meta.title||'notes').replace(/\W+/g,'_')+'_notes';}
  // ---- Version texte ----
  function notesTxt(only,label){
    const d=collectNotes(only);
    let t=(C.meta.title||'Cours')+'\n'+'='.repeat((C.meta.title||'Cours').length)+'\n\n'+(label||'Mes notes')+'\n\n';
    d.refl.forEach(function(r){t+='● '+r.q+'\n'+(r.v&&r.v.trim()?r.v:'(pas de note)')+'\n\n';});
    d.pits.forEach(function(pp){t+='● '+pp.q+'\n';pp.items.forEach(function(x){t+='  – '+x.t.trim()+'\n';});t+='\n';});
    if(d.hl.length){t+='Passages surlignés\n\n';d.hl.forEach(function(h){t+='● '+h.les+'\n';h.items.forEach(function(x){t+='  ▸ '+x.t+'\n';});t+='\n';});}
    t+='\n— Généré le '+new Date().toLocaleDateString('fr-FR');
    return t;
  }
  function downloadNotesTxt(only,label){
    const sx=stats();sx.dl=(sx.dl||0)+1;persist();checkBadges();
    const blob=new Blob([notesTxt(only,label)],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=notesFileName()+'.txt';a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  }
  // ---- Version document (PDF via impression) ----
  function notesDocHTML(only,label){
    const d=collectNotes(only);
    const t=C.theme;
    const logo=t.logo?'<img class="np-logo" src="'+t.logo+'" alt="'+E(t.logoAlt||'')+'">':'';
    let h='<div class="np-page"><header class="np-head">'+logo+
      '<div class="np-kick">'+E(C.meta.title||'Cours')+'</div>'+
      '<h1>'+E(label||T('Mes notes'))+'</h1>'+
      '<div class="np-meta">'+(C.meta.author?E(C.meta.author)+' · ':'')+'Généré le '+new Date().toLocaleDateString('fr-FR')+'</div>'+
      '</header>';
    if(!d.any)h+='<p class="np-empty">Aucune note pour le moment.</p>';
    if(d.refl.length){
      h+='<section class="np-sec"><h2>Réflexions</h2>';
      d.refl.forEach(function(r){
        h+='<article class="np-item"><div class="np-q">'+E(r.q)+'</div>'+
          '<div class="np-a'+(r.v&&r.v.trim()?'':' np-none')+'">'+(r.v&&r.v.trim()?E(r.v).replace(/\n/g,'<br>'):T('Pas de note'))+'</div>'+
          '<div class="np-src">'+E(r.les)+'</div></article>';
      });
      h+='</section>';
    }
    if(d.pits.length){
      h+='<section class="np-sec"><h2>Idées</h2>';
      d.pits.forEach(function(pp){
        h+='<article class="np-item"><div class="np-q">'+E(pp.q)+'</div><div class="np-pits">';
        pp.items.forEach(function(x){h+='<span class="np-pit" style="background:'+(x.c||'#ffe066')+'">'+E(x.t.trim())+'</span>';});
        h+='</div><div class="np-src">'+E(pp.les)+'</div></article>';
      });
      h+='</section>';
    }
    if(d.hl.length){
      h+='<section class="np-sec"><h2>Passages surlignés</h2>';
      d.hl.forEach(function(g){
        h+='<article class="np-item"><div class="np-q">'+E(g.les)+'</div><ul class="np-hl">';
        g.items.forEach(function(x){h+='<li><span style="background:'+(x.c||'#ffe066')+'">'+E(x.t)+'</span></li>';});
        h+='</ul></article>';
      });
      h+='</section>';
    }
    return h+'<footer class="np-foot">'+E(C.meta.title||'')+' — page </footer></div>';
  }
  function openNotesDoc(only,label){
    const old=document.getElementById('npOv');if(old)old.remove();
    const ov=document.createElement('div');ov.className='np-ov';ov.id='npOv';
    ov.innerHTML='<div class="np-bar"><span class="np-bt">'+E(label||T('Mes notes'))+'</span>'+
      '<div class="np-acts"><button class="np-btn" id="npPrint">'+T('Enregistrer en PDF')+'</button>'+
      '<button class="np-btn ghost" id="npTxt">'+T('Version texte')+'</button>'+
      '<button class="np-btn ghost" id="npClose">'+T('Fermer')+'</button></div></div>'+
      '<div class="np-scroll">'+notesDocHTML(only,label)+'</div>';
    document.body.appendChild(ov);
    document.getElementById('npPrint').onclick=function(){window.print();};
    document.getElementById('npTxt').onclick=function(){downloadNotesTxt(only,label);};
    document.getElementById('npClose').onclick=function(){ov.remove();document.body.classList.remove('np-open');};
    document.body.classList.add('np-open');
  }
  function downloadNotes(only,label,fmt){
    if(fmt==='txt')downloadNotesTxt(only,label);
    else openNotesDoc(only,label);
  }

  /* ============ MODE ÉDITION (WYSIWYG) ============ */
  if(window.__EDIT__){
    buildEditCanvas();
    return;
  }

  function buildEditCanvas(){
    document.body.innerHTML='';
    document.body.className='edit-mode';
    const wrap=document.createElement('div');wrap.className='edit-content';
    document.body.appendChild(wrap);
    const li=window.__EDIT_LESSON__||0;
    const L=lessons[li]?lessons[li].l:(C.modules[0]&&C.modules[0].lessons[0]);
    const selId=window.__EDIT_SEL__||null;
    if(!L){wrap.innerHTML='<div class="edit-empty">Sélectionnez une leçon.</div>';return;}
    const head=document.createElement('div');head.className='edit-lhead';
    const m=lessons[li]?lessons[li].m:C.modules[0];
    head.innerHTML='<div class="les-kicker">'+E(m?m.title:'')+'</div><h1 class="les-h1">'+E(L.title)+'</h1>';
    if(!L.blocks.length){
      const s=document.createElement('div');s.className='sec';const si=document.createElement('div');si.className='sec-in';
      si.appendChild(head);const e=document.createElement('div');e.className='edit-empty';e.innerHTML='Leçon vide. Utilisez « Ajouter un bloc ».';
      si.appendChild(e);s.appendChild(si);wrap.appendChild(s);
    } else {
      sectionize(wrap,L.blocks,head,(b,idx)=>{
        const slot=document.createElement('div');slot.className='eb-slot'+(b.id===selId?' sel':'')+((b.type==='divider'||b.type==='spacer')?' eb-flush':'')+(b.type==='divider'?' eb-dv':'');slot.dataset.bid=b.id;slot.dataset.idx=idx;slot.draggable=true;
        let rendered;try{rendered=renderBlock(b);}catch(e){rendered=document.createElement('div');rendered.textContent='[Erreur de rendu]';}
        if(b.type==='spacer'&&b.fill==='image'&&b.img){
          slot.classList.add('eb-spos');
          const sb=rendered.querySelector('.spacer-block');
          if(sb){
            sb.addEventListener('pointerdown',ev=>{
              if(ev.target.closest('.sp-txt'))return;
              ev.preventDefault();ev.stopPropagation();
              try{sb.setPointerCapture(ev.pointerId);}catch(e){}
              sb.classList.add('spos-drag');
              const r=sb.getBoundingClientRect();
              const x0=ev.clientX,y0=ev.clientY;
              const bx=(b.imgX==null?50:b.imgX),by=(b.imgY==null?50:b.imgY);
              let nx=bx,ny=by;
              const im=sb.querySelector('.sp-img');
              const move=e2=>{
                nx=Math.max(0,Math.min(100,bx-((e2.clientX-x0)/Math.max(1,r.width))*100));
                ny=Math.max(0,Math.min(100,by-((e2.clientY-y0)/Math.max(1,r.height))*100));
                if(im)im.style.backgroundPosition=nx.toFixed(1)+'% '+ny.toFixed(1)+'%';
              };
              const up=()=>{
                sb.removeEventListener('pointermove',move);sb.removeEventListener('pointerup',up);sb.removeEventListener('pointercancel',up);
                sb.classList.remove('spos-drag');
                post('spos',{id:b.id,x:Math.round(nx*10)/10,y:Math.round(ny*10)/10});
              };
              sb.addEventListener('pointermove',move);sb.addEventListener('pointerup',up);sb.addEventListener('pointercancel',up);
            });
          }
        }
        if((b.type==='hotspot'||b.type==='zoomin')&&b.img){
          slot.classList.add('eb-hot');
          const hw=rendered.querySelector('.hot-wrap');
          if(hw){
            rendered.querySelectorAll('.hot-pop').forEach(x=>x.remove());
            const pct=(ev,r)=>[Math.max(0,Math.min(100,((ev.clientX-r.left)/r.width)*100)),Math.max(0,Math.min(100,((ev.clientY-r.top)/r.height)*100))];
            rendered.querySelectorAll('.hot-pin').forEach((pin,pi)=>{
              pin.classList.add('pin-drag');pin.onclick=e=>{e.stopPropagation();e.preventDefault();};
              pin.addEventListener('pointerdown',ev=>{
                ev.preventDefault();ev.stopPropagation();
                try{pin.setPointerCapture(ev.pointerId);}catch(e){}
                pin.classList.add('dragging');
                let nx=null,ny=null;
                const move=e2=>{const r=hw.getBoundingClientRect();const c=pct(e2,r);nx=c[0];ny=c[1];
                  pin.style.left=nx+'%';pin.style.top=ny+'%';};
                const up=()=>{
                  pin.removeEventListener('pointermove',move);pin.removeEventListener('pointerup',up);pin.removeEventListener('pointercancel',up);
                  pin.classList.remove('dragging');
                  if(nx!=null)post('spot',{id:b.id,spot:(b.spots[pi]||{}).id,x:Math.round(nx*10)/10,y:Math.round(ny*10)/10});
                };
                pin.addEventListener('pointermove',move);pin.addEventListener('pointerup',up);pin.addEventListener('pointercancel',up);
              });
            });
            hw.addEventListener('dblclick',ev=>{ev.preventDefault();ev.stopPropagation();
              const r=hw.getBoundingClientRect();const c=pct(ev,r);
              post('addspot',{id:b.id,x:Math.round(c[0]*10)/10,y:Math.round(c[1]*10)/10});});
            const tip=document.createElement('div');tip.className='hot-tip';
            tip.textContent='Faites glisser les points · double-cliquez sur l\'image pour en ajouter un';
            rendered.appendChild(tip);
          }
        }
        const guard=document.createElement('div');guard.className='eb-guard';
        // Une transition qui chevauche son voisin occupe un rectangle, mais ne DESSINE qu'une forme.
        // Si sa zone de clic reste rectangulaire, elle avale le voisin (un espaceur court disparaît
        // entre deux transitions). On calque donc la zone de clic sur la forme réelle : le reste
        // du rectangle laisse passer le clic vers le bloc du dessous.
        if(b.type==='divider'){
          const dv=rendered.querySelector('.divider-block');
          const vp=rendered.querySelector('.dv-vp');
          if(dv&&vp&&dv.dataset.ov){
            const clone=vp.cloneNode(true);
            clone.style.opacity='0';
            clone.style.position='absolute';clone.style.inset='0';
            clone.style.pointerEvents='none';
            const cs=clone.querySelector('svg');if(cs)cs.style.pointerEvents='none';
            clone.querySelectorAll('path').forEach(pa=>{pa.style.pointerEvents='fill';pa.style.cursor='pointer';});
            guard.appendChild(clone);
            guard.classList.add('eb-guard-shape');
          }
        }
        const inner=document.createElement('div');inner.className='eb-inner';
        inner.appendChild(rendered);inner.appendChild(guard);
        if(b.altFor){
          const ac=document.createElement('span');ac.className='eb-alt';ac.setAttribute('aria-hidden','true');
          ac.textContent='♿ Version accessible';
          ac.title='Ce bloc remplace le bloc précédent quand l\'apprenant active la version accessible.';
          slot.appendChild(ac);slot.classList.add('eb-altblk');
        }
        const fv=(window.__FB__||{})[b.id];
        if(fv){
          const fc2=document.createElement('span');
          fc2.className='eb-fb'+(fv.todo?'':' done');
          fc2.setAttribute('aria-hidden','true');
          fc2.textContent=(fv.todo?'💬 '+fv.todo:'✅ '+fv.n);
          fc2.title=fv.todo?fv.todo+' retour(s) de relecture à traiter':'Tous les retours sont traités';
          slot.appendChild(fc2);
        }
        const av=(window.__A11Y__||{})[b.id];
        if(av){
          const chip=document.createElement('span');
          chip.className='eb-a11y '+av.lv;
          chip.setAttribute('aria-hidden','true');
          chip.textContent=(av.lv==='err'?'⛔':'⚠️')+' '+av.n;
          chip.title=(C.__uilang==='en')
            ? (av.n+(av.lv==='err'?(' blocking accessibility point'+(av.n>1?'s':'')):(' accessibility point'+(av.n>1?'s':'')+' to check'))+' — click the block for details')
            : ((av.lv==='err'?(av.n+' point(s) bloquant(s) pour l\'accessibilité'):(av.n+' point(s) d\'accessibilité à vérifier'))+' — cliquez sur le bloc pour le détail');
          slot.appendChild(chip);
        }
        const tools=document.createElement('div');tools.className='eb-tools';
        tools.innerHTML='<span class="eb-label">'+E((C.__labels&&C.__labels[b.type])||b.type)+'</span>'+
          '<button data-a="up" title="Monter">&#9650;</button>'+
          '<button data-a="down" title="Descendre">&#9660;</button>'+
          '<button data-a="dup" title="Dupliquer">&#10697;</button>'+
          '<button data-a="del" title="Supprimer">&#10005;</button>';
        const ins=document.createElement('button');ins.className='eb-ins';ins.title=((C.__uilang==='en')?'Insert a block here':'Insérer un bloc ici');
        ins.innerHTML='<span>+</span>';
        ins.onclick=e=>{e.stopPropagation();post('insert',{idx:idx});};
        slot.appendChild(ins);
        slot.appendChild(tools);slot.appendChild(inner);
        slot.addEventListener('click',e=>{if(e.target.closest('.eb-tools'))return;post('select',{id:b.id});});
        tools.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();post('action',{id:b.id,act:btn.dataset.a});}));
        slot.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',idx);slot.classList.add('dragging');});
        slot.addEventListener('dragend',()=>slot.classList.remove('dragging'));
        slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drop-target');});
        slot.addEventListener('dragleave',()=>slot.classList.remove('drop-target'));
        slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drop-target');const from=+e.dataTransfer.getData('text/plain');if(from!==idx)post('move',{from:from,to:idx});});
        return slot;
      });
    }
    const addSec=document.createElement('div');addSec.className='sec';
    const addIn=document.createElement('div');addIn.className='sec-in';addSec.appendChild(addIn);wrap.appendChild(addSec);
    const add=document.createElement('button');add.className='eb-add';add.innerHTML='<span>+</span> '+((C.__uilang==='en')?'Add a block':'Ajouter un bloc');
    add.onclick=()=>post('add',{});
    addIn.appendChild(add);
  }
  function post(type,data){try{parent.postMessage(Object.assign({__edit:true,type:type},data),'*');}catch(e){}}

  /* ============ DÉMARRAGE ============ */
  SCORM.init();
  buildShell();
  let start=state.idx||0;if(start>=lessons.length)start=0;
  // si verrouillé, revenir à la première non terminée
  if(lessonState(start)==='locked'){start=lessons.findIndex((_,i)=>lessonState(i)!=='locked');if(start<0)start=0;}
  renderLesson(start);
  window.addEventListener('beforeunload',()=>{persist();SCORM.finish();});
})();</script></body></html>
